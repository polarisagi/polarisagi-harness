<dialog id="onboard-modal" class="modal" :class="$store.onboard.show ? 'modal-open' : ''" x-cloak x-data>
  <div class="modal-box max-w-2xl">

    <!-- 关闭 / 跳过 -->
    <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"  @click="$store.onboard.dismiss()" :title="$store.i18n.t('onboard_skip_title')">✕</button></form>

    <!-- 步骤进度（step 2-4 显示） -->
    
    <!-- 步骤进度 -->
    <ul class="steps w-full mb-8" x-show="$store.onboard.step >= 2 && $store.onboard.step <= 4">
      <li class="step step-primary" x-text="$store.i18n.t('onboard_welcome')"></li>
      <li class="step" :class="$store.onboard.step >= 2 ? 'step-primary' : ''" x-text="$store.i18n.t('onboard_step1')"></li>
      <li class="step" :class="$store.onboard.step >= 3 ? 'step-primary' : ''" x-text="$store.i18n.t('onboard_step2')"></li>
      <li class="step" :class="$store.onboard.step >= 4 ? 'step-primary' : ''">渠道</li>
    </ul>

    <!-- ─── Step 1: 欢迎 ─────────────────────────────────────── -->
    <div x-show="$store.onboard.step === 1" class="onboard-step">
      <div class="text-6xl mb-4 text-center">🚀</div>
      <h2 class="text-2xl font-bold mb-2" x-text="$store.i18n.t('onboard_welcome')"></h2>
      <p class="text-base-content/70 mb-6" x-text="$store.i18n.t('onboard_desc')"></p>
      <div class="modal-action mt-6">
        <button class="btn btn-primary" @click="$store.onboard.step = 2" x-text="$store.i18n.t('onboard_start')"></button>
        <button class="btn btn-ghost" @click="$store.onboard.dismiss()" x-text="$store.i18n.t('onboard_skip_btn')"></button>
      </div>
    </div>

    <!-- ─── Step 2: LLM Provider ─────────────────────────────── -->
    <div x-show="$store.onboard.step === 2" class="onboard-step">
      <h2 class="text-2xl font-bold mb-2" x-text="$store.i18n.t('onboard_step1')"></h2>
      <p class="text-base-content/70 mb-6" x-text="$store.i18n.t('onboard_step1_desc')"></p>

      <label class="form-control w-full mb-4">
        <div class="label"><span class="label-text font-medium"  x-text="$store.i18n.t('providers_type')"></span></div>
        <select id="ob-provider-type" name="ob-provider-type" class="select select-bordered w-full" x-model="$store.onboard.providerForm.type">
          <option value="openai_compat" x-text="$store.i18n.t('onboard_provider_openai')"></option>
          <option value="anthropic">Anthropic</option>
          <option value="google_agent_platform">Google</option>
          <option value="ollama" x-text="$store.i18n.t('onboard_provider_ollama')"></option>
        </select>
        </label>
      <label class="form-control w-full mb-4">
        <div class="label"><span class="label-text font-medium"  x-text="$store.i18n.t('providers_name')"></span></div>
        <input id="ob-provider-name" name="ob-provider-name" class="input input-bordered w-full" type="text"
               x-model="$store.onboard.providerForm.name"
               :placeholder="{ openai_compat: 'DeepSeek V4', anthropic: 'Claude', google_agent_platform: 'Gemini', ollama: 'Ollama 本地' }[$store.onboard.providerForm.type]" />
        </label>
      <template x-if="$store.onboard.providerForm.type === 'openai_compat' || $store.onboard.providerForm.type === 'ollama'">
        <label class="form-control w-full mb-4">
          <div class="label"><span class="label-text font-medium" >Base URL</span></div>
          <input id="ob-base-url" name="ob-base-url" class="input input-bordered w-full" type="url"
                 x-model="$store.onboard.providerForm.base_url"
                 :placeholder="$store.onboard.providerForm.type === 'ollama' ? 'http://localhost:11434' : 'https://api.deepseek.com'" />
        </label>
      </template>
      <template x-if="$store.onboard.providerForm.type !== 'ollama'">
        <label class="form-control w-full mb-4">
          <div class="label"><span class="label-text font-medium" >API Key</span></div>
          <input id="ob-api-key" name="ob-api-key" class="input input-bordered w-full" type="password"
                 x-model="$store.onboard.providerForm.api_key"
                 :placeholder="{ openai_compat: 'sk-...', anthropic: 'sk-ant-...', google_agent_platform: 'AIza...' }[$store.onboard.providerForm.type] || 'API Key'" />
        </label>
      </template>

      <!-- 连接测试结果 -->
      <div x-show="$store.onboard.testResult" class="alert mt-4" :class="$store.onboard.testResult === 'ok' ? 'alert-success' : 'alert-error'">
        <span x-text="$store.onboard.testResult === 'ok' ? '✓ ' : '✗ '"></span>
        <span x-text="$store.onboard.testMsg"></span>
      </div>

      <div class="modal-action mt-6">
        <button class="btn btn-primary" @click="$store.onboard.saveProvider()" :disabled="$store.onboard.saving">
          <span x-show="$store.onboard.saving" class="loading loading-spinner loading-xs"></span>
          下一步 →
        </button>
        <button class="btn btn-ghost" @click="$store.onboard.testProvider()"
                :disabled="$store.onboard.testingProvider || $store.onboard.saving">
          <span x-show="$store.onboard.testingProvider" class="loading loading-spinner loading-xs"></span>
          <span x-show="!$store.onboard.testingProvider" x-text="$store.i18n.t('providers_test')"></span>
        </button>
        <button class="btn btn-ghost" @click="$store.onboard.step = 1" x-text="$store.i18n.t('onboard_back')"></button>
      </div>
    </div>

    <!-- ─── Step 3: 添加模型 ──────────────────────────────────── -->
    <div x-show="$store.onboard.step === 3" class="onboard-step">
      <h2 class="text-2xl font-bold mb-2" x-text="$store.i18n.t('onboard_step2')"></h2>
      <p class="text-base-content/70 mb-6" x-text="$store.i18n.t('onboard_step2_desc')"></p>

      <!-- 已添加模型标签 -->
      <div x-show="$store.onboard.models.length > 0" class="onboard-model-list">
        <template x-for="m in $store.onboard.models" :key="m.model_id">
          <div class="badge badge-lg gap-2">
            <span x-text="m.model_id"></span>
            <span class="badge badge-sm badge-neutral"  x-text="{ default: '对话', reasoning: '推理', general: '通用' }[m.role]"></span>
          </div>
        </template>
      </div>

      <label class="form-control w-full mb-4">
        <div class="label"><span class="label-text font-medium"  x-text="$store.i18n.t('providers_model_id')"></span></div>
        <input id="ob-model-id" name="ob-model-id" class="input input-bordered w-full" type="text"
               x-model="$store.onboard.modelForm.model_id"
               @keydown.enter.prevent="$store.onboard.addModel()"
               placeholder="如：deepseek-chat / claude-sonnet-4-5 / llama3.2" />
        </label>
      <label class="form-control w-full mb-4">
        <div class="label"><span class="label-text font-medium"  x-text="$store.i18n.t('onboard_model_usage')"></span></div>
        <select id="ob-model-role" name="ob-model-role" class="select select-bordered w-full" x-model="$store.onboard.modelForm.role">
          <option value="default" x-text="$store.i18n.t('onboard_usage_chat')"></option>
          <option value="reasoning" x-text="$store.i18n.t('onboard_usage_reasoning')"></option>
          <option value="general" x-text="$store.i18n.t('onboard_usage_general')"></option>
        </select>
        </label>

      <div class="modal-action mt-6">
        <button class="btn btn-ghost" @click="$store.onboard.addModel()" :disabled="$store.onboard.saving">
          <span x-show="$store.onboard.saving" class="loading loading-spinner loading-xs"></span>
          + 添加
        </button>
        <button class="btn btn-primary" @click="$store.onboard.step = 4"
                :disabled="$store.onboard.models.length === 0">
          下一步 →
        </button>
        <button class="btn btn-ghost" @click="$store.onboard.step = 2" x-text="$store.i18n.t('onboard_back')"></button>
      </div>
      <div x-show="$store.onboard.models.length === 0"
           style="font-size:12px;color:var(--color-text-dim);margin-top:10px" x-text="$store.i18n.t('onboard_need_model')"></div>
    </div>

    <!-- ─── Step 4: 消息渠道（可选） ───────────────────────────── -->
    <div x-show="$store.onboard.step === 4" class="onboard-step">
      <h2 class="text-2xl font-bold mb-2">Step 3 · 消息渠道
        <span style="font-size:13px;color:var(--color-text-dim);font-weight:400" x-text="$store.i18n.t('onboard_optional')"></span>
      </h2>
      <p class="text-base-content/70 mb-6" x-text="$store.i18n.t('onboard_step3_desc')"></p>

      <label class="form-control w-full mb-4">
        <div class="label"><span class="label-text font-medium"  x-text="$store.i18n.t('onboard_channel_type')"></span></div>
        <select id="ob-channel-type" name="ob-channel-type" class="select select-bordered w-full" x-model="$store.onboard.channelForm.type">
          <option value="telegram">Telegram Bot</option>
          <option value="feishu" x-text="$store.i18n.t('onboard_feishu')"></option>
          <option value="slack">Slack</option>
          <option value="discord">Discord</option>
          <option value="webhook" x-text="$store.i18n.t('onboard_webhook')"></option>
        </select>
        </label>
      <label class="form-control w-full mb-4">
        <div class="label"><span class="label-text font-medium"  x-text="$store.i18n.t('onboard_channel_name')"></span></div>
        <input id="ob-channel-name" name="ob-channel-name" class="input input-bordered w-full" type="text"
               x-model="$store.onboard.channelForm.name"
               placeholder="如：我的 Telegram Bot" />
        </label>
      <template x-if="$store.onboard.channelConfigLabel($store.onboard.channelForm.type)">
        <label class="form-control w-full mb-4">
          <div class="label"><span class="label-text font-medium" 
                 x-text="$store.onboard.channelConfigLabel($store.onboard.channelForm.type)"></span></div>
          <input id="ob-channel-token" name="ob-channel-token" class="input input-bordered w-full" type="password"
                 :value="$store.onboard.channelForm.config[$store.onboard.channelConfigKey($store.onboard.channelForm.type)] || ''"
                 @input="$store.onboard.channelForm.config[$store.onboard.channelConfigKey($store.onboard.channelForm.type)] = $event.target.value"
                 placeholder="..." />
        </label>
      </template>

      <div class="modal-action mt-6">
        <button class="btn btn-primary" @click="$store.onboard.saveChannelAndFinish()" :disabled="$store.onboard.saving">
          <span x-show="$store.onboard.saving" class="loading loading-spinner loading-xs"></span>
          保存渠道并完成
        </button>
        <button class="btn btn-ghost" @click="$store.onboard.finish()" x-text="$store.i18n.t('onboard_finish')"></button>
        <button class="btn btn-ghost" @click="$store.onboard.step = 3" x-text="$store.i18n.t('onboard_back')"></button>
      </div>
    </div>

  </div>

</dialog>
