<!-- ─────── Insights 用量洞察页 ──────────────────── -->
    <div x-show="$store.nav.page === 'insights'" x-cloak class="flex-1 min-h-0 overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="text-2xl font-bold text-base-content" x-text="$store.i18n.t('insights_title')"></div>
          <div class="text-sm text-base-content/70 mt-1" x-text="$store.i18n.t('insights_subtitle')"></div>
        </div>
        <div class="flex items-center gap-2">
          <select name="insights-days" aria-label="统计周期" class="select select-bordered select-sm w-auto"
                  x-model.number="$store.insights.days" @change="$store.insights.load()">
            <option value="7">7 天</option>
            <option value="30">30 天</option>
            <option value="90">90 天</option>
          </select>
        </div>
      </div>

      <div x-show="$store.insights.loading" class="flex flex-col items-center justify-center p-12 text-base-content/50" x-text="$store.i18n.t('loading')"></div>

      <template x-if="$store.insights.data && !$store.insights.loading">
        <div>
          <!-- 数字汇总卡片 -->
          <div class="grid grid-cols-[repeat(auto-fill,minmax(150px,1fr))] gap-3 mb-5">
            <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
              <div class="text-[13px] font-semibold text-base-content" x-text="$store.i18n.t('insights_total_sessions')"></div>
              <div class="text-xl mt-2" x-text="$store.insights.data.total_sessions.toLocaleString()"></div>
            </div>
            <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
              <div class="text-[13px] font-semibold text-base-content" x-text="$store.i18n.t('insights_total_messages')"></div>
              <div class="text-xl mt-2" x-text="$store.insights.data.total_messages.toLocaleString()"></div>
            </div>
            <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
              <div class="text-[13px] font-semibold text-base-content" x-text="`${$store.insights.data.period_days}天 会话`"></div>
              <div class="text-xl mt-2" x-text="$store.insights.data.period_sessions.toLocaleString()"></div>
            </div>
            <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
              <div class="text-[13px] font-semibold text-base-content" x-text="`${$store.insights.data.period_days}天 消息`"></div>
              <div class="text-xl mt-2" x-text="$store.insights.data.period_messages.toLocaleString()"></div>
            </div>
          </div>

          <!-- 角色分布 -->
          <div class="bg-base-200 border border-base-300 rounded-box p-4 mb-4">
            <div class="font-semibold text-[13px] mb-3" x-text="$store.i18n.t('insights_role_breakdown')"></div>
            <div class="flex gap-4 flex-wrap">
              <template x-for="[role, cnt] in Object.entries($store.insights.data.role_breakdown || {})" :key="role">
                <div class="flex items-center gap-1.5">
                  <span class="text-xs px-2 py-0.5 rounded-full bg-base-100" x-text="role"></span>
                  <span class="font-semibold" x-text="cnt.toLocaleString()"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- 每日趋势简易条形图 -->
          <div class="bg-base-200 border border-base-300 rounded-box p-4 mb-4">
            <div class="font-semibold text-[13px] mb-3" x-text="$store.i18n.t('insights_daily_trend')"></div>
            <div x-show="$store.insights.data.daily_trend.length === 0" class="text-base-content/70 text-xs py-2">暂无数据</div>
            <div class="flex items-end gap-1 h-20 overflow-x-auto">
              <template x-for="d in $store.insights.data.daily_trend" :key="d.day">
                <div class="flex flex-col items-center gap-0.5 min-w-[28px]">
                  <div class="text-[9px] text-base-content/70" x-text="d.count"></div>
                  <div class="bg-primary rounded-t-[3px] w-[18px] transition-[height] duration-200"
                       :style="`height:${Math.round(d.count/$store.insights.maxDailyCount()*64)+4}px`"
                       :title="`${d.day}: ${d.count} 条`"></div>
                  <div class="text-[9px] text-base-content/70 [writing-mode:vertical-rl] [text-orientation:mixed]"
                       x-text="d.day.slice(5)"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- 最活跃会话 -->
          <div class="bg-base-200 border border-base-300 rounded-box p-4">
            <div class="font-semibold text-[13px] mb-3" x-text="$store.i18n.t('insights_top_sessions')"></div>
            <div x-show="$store.insights.data.top_sessions.length === 0" class="text-base-content/70 text-xs py-2">暂无数据</div>
            <div class="flex flex-col gap-1.5">
              <template x-for="(sess, i) in $store.insights.data.top_sessions" :key="sess.id">
                <div class="flex items-center gap-2.5 cursor-pointer hover:bg-base-300 p-1 rounded transition-colors"
                     @click="Alpine.store('chat').loadSession(sess.id); Alpine.store('nav').navigate('chat')">
                  <span class="text-[11px] text-base-content/70 w-5 text-right" x-text="i+1"></span>
                  <div class="flex-1 min-w-0 overflow-hidden text-ellipsis whitespace-nowrap text-xs"
                       x-text="sess.title || sess.id.slice(0,20)+'…'"></div>
                  <span class="text-[11px] px-2 py-0.5 bg-base-100 rounded-full shrink-0" x-text="`${sess.message_count} 条`"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
      <!-- Trajectory 导出 -->
      <div class="mt-4 p-4 bg-base-200 border border-base-300 rounded-box flex items-center justify-between">
        <div>
          <div class="font-semibold text-[13px]">训练数据导出</div>
          <div class="text-xs text-base-content/70 mt-0.5">将高质量对话导出为 SFT 微调数据集</div>
        </div>
        <div class="flex gap-2" x-data="{fmt:'sharegpt',days:30}">
          <select name="export-format" aria-label="导出格式" class="select select-bordered select-sm w-auto text-xs" x-model="fmt">
            <option value="sharegpt">ShareGPT</option>
            <option value="openai">OpenAI</option>
            <option value="raw">Raw JSON</option>
          </select>
          <a class="btn btn-ghost btn-sm"
             :href="`/v1/export/trajectories?format=${fmt}&days=${$store.insights.days}&min_turns=2`"
             download="trajectories.jsonl">导出 JSONL</a>
        </div>
      </div>
    </div><!-- /insights -->

    <!-- ─────── 评测套件页（Eval Harness） ──────────────── -->
    <div x-show="$store.nav.page === 'eval'" x-cloak class="flex-1 min-h-0 overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="text-2xl font-bold text-base-content" x-text="$store.i18n.t('eval_title')"></div>
          <div class="text-sm text-base-content/70 mt-1" x-text="$store.i18n.t('eval_subtitle')"></div>
        </div>
        <div class="flex items-center gap-2">
          <select name="eval-suite" aria-label="Suite" class="select select-bordered select-sm w-auto"
                  x-model="$store.eval.suite">
            <option value="training" x-text="$store.i18n.t('eval_suite_training')"></option>
            <option value="validation" x-text="$store.i18n.t('eval_suite_validation')"></option>
          </select>
          <button class="btn btn-primary btn-sm" @click="$store.eval.run()"
                  :disabled="$store.eval.running"
                  x-text="$store.eval.running ? $store.i18n.t('eval_running') : $store.i18n.t('eval_run')"></button>
        </div>
      </div>

      <!-- 加载中 -->
      <div x-show="$store.eval.running && !$store.eval.report" class="flex flex-col items-center justify-center p-12 text-base-content/50">
        <div class="loading loading-spinner w-8 h-8 mx-auto mb-3"></div>
        <p x-text="$store.i18n.t('eval_running')"></p>
      </div>

      <!-- 当前报告 -->
      <template x-if="$store.eval.report">
        <div class="bg-base-200 border border-base-300 rounded-box p-5 mb-4">
          <div class="flex items-center justify-between mb-4">
            <span class="font-semibold text-sm text-base-content" x-text="'Suite: ' + $store.eval.report.suite"></span>
            <span :style="$store.eval.statusClass($store.eval.report.status)"
                  x-text="$store.eval.statusLabel($store.eval.report.status)"></span>
          </div>
          <div class="grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-3">
            <div class="bg-base-100 p-3 rounded-lg text-center">
              <div class="text-2xl font-bold text-base-content" x-text="$store.eval.report.total_cases"></div>
              <div class="text-[11px] text-base-content/70 mt-1" x-text="$store.i18n.t('eval_total')"></div>
            </div>
            <div class="bg-base-100 p-3 rounded-lg text-center">
              <div class="text-2xl font-bold text-success" x-text="$store.eval.report.pass_count"></div>
              <div class="text-[11px] text-base-content/70 mt-1" x-text="$store.i18n.t('eval_pass')"></div>
            </div>
            <div class="bg-base-100 p-3 rounded-lg text-center">
              <div class="text-2xl font-bold text-error" x-text="$store.eval.report.fail_count"></div>
              <div class="text-[11px] text-base-content/70 mt-1" x-text="$store.i18n.t('eval_fail')"></div>
            </div>
            <div class="bg-base-100 p-3 rounded-lg text-center">
              <div class="text-2xl font-bold text-warning" x-text="$store.eval.report.safety_fail"></div>
              <div class="text-[11px] text-base-content/70 mt-1" x-text="$store.i18n.t('eval_safety_fail')"></div>
            </div>
            <div class="bg-base-100 p-3 rounded-lg text-center">
              <div class="text-2xl font-bold" :class="$store.eval.passRate($store.eval.report) >= 80 ? 'text-success' : 'text-error'"
                   x-text="$store.eval.passRate($store.eval.report) + '%'"></div>
              <div class="text-[11px] text-base-content/70 mt-1" x-text="$store.i18n.t('eval_pass_rate')"></div>
            </div>
          </div>
        </div>
      </template>

      <!-- 无结果 -->
      <div x-show="!$store.eval.running && !$store.eval.report && $store.eval.history.length === 0" class="flex flex-col items-center justify-center p-12 text-base-content/50">
        <div class="text-[32px] mb-3">🧪</div>
        <div x-text="$store.i18n.t('eval_no_results')"></div>
      </div>

      <!-- 历史记录 -->
      <template x-if="$store.eval.history.length > 0">
        <div class="mt-4">
          <div class="font-semibold text-[13px] mb-2 text-base-content" x-text="$store.i18n.t('eval_history')"></div>
          <div class="flex flex-col gap-1.5">
            <template x-for="h in $store.eval.history" :key="h._runAt">
              <div class="flex items-center gap-3 p-2 bg-base-200 rounded-md text-xs">
                <span class="font-semibold w-20 shrink-0 text-base-content" x-text="h.suite"></span>
                <span :style="$store.eval.statusClass(h.status)" x-text="$store.eval.statusLabel(h.status)"></span>
                <span class="text-base-content/70" x-text="h.pass_count + '/' + h.total_cases + ' passed'"></span>
                <span class="text-base-content/70 ml-auto" x-text="new Date(h._runAt).toLocaleString()"></span>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div><!-- /eval -->
