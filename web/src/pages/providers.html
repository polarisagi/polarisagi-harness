<!-- ─────── 模型厂商配置页 ───────────────────────────── -->
    <div x-show="$store.nav.page === 'providers'" x-cloak class="flex-1 min-h-0 overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="text-2xl font-bold" x-text="$store.i18n.t('providers_title')"></div>
          <div class="text-sm text-base-content/60 mt-1" x-text="$store.i18n.t('providers_subtitle')"></div>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn btn-ghost btn-sm" @click="$store.onboard.start()" title="重新运行配置向导">⚙ 配置向导</button>
          <button class="btn btn-primary btn-sm" @click="$store.providers.openCreate()"
            x-text="$store.i18n.t('providers_add')"></button>
        </div>
      </div>

      <!-- 模型角色分配面板（选项来自 allModels，粒度到具体模型） -->
      <div class="bg-base-200 border border-base-300 rounded-box p-4 mb-5"
           x-data>
        <div class="font-bold text-sm mb-1" x-text="$store.i18n.t('roles_title')"></div>
        <div class="text-xs text-base-content/60 mb-3" x-text="$store.i18n.t('roles_subtitle')"></div>
        <div class="grid grid-cols-2 gap-3">
          <div>
          <label class="form-control w-full">
            <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('roles_default')"></span></div>
            <select id="roles-default" name="roles-default" class="form-select" x-model="$store.modelRoles.defaultModelID">
              <option value="" x-text="$store.i18n.t('roles_none')"></option>
              <template x-for="m in $store.providers.allModels" :key="m.id">
                <option :value="m.id" x-text="`[${m.providerName}] ${m.model_id}`"></option>
              </template>
            </select>
            <div x-show="$store.modelRoles.defaultModelName"
                 class="text-[11px] text-base-content/60 mt-1"
                 x-text="`当前: ${$store.modelRoles.defaultProviderName} / ${$store.modelRoles.defaultModelName}`"></div>
          </div>
          <div>
          <label class="form-control w-full">
            <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('roles_reasoning')"></span></div>
            <select id="roles-reasoning" name="roles-reasoning" class="form-select" x-model="$store.modelRoles.reasoningModelID">
              <option value="" x-text="$store.i18n.t('roles_none')"></option>
              <template x-for="m in $store.providers.allModels" :key="m.id">
                <option :value="m.id" x-text="`[${m.providerName}] ${m.model_id}`"></option>
              </template>
            </select>
            <div x-show="$store.modelRoles.reasoningModelName"
                 class="text-[11px] text-base-content/60 mt-1"
                 x-text="`当前: ${$store.modelRoles.reasoningProviderName} / ${$store.modelRoles.reasoningModelName}`"></div>
          </div>
        </div>
        <div class="mt-3 flex justify-end">
          <button class="btn btn-primary btn-sm" :disabled="$store.modelRoles.saving"
                  @click="$store.modelRoles.save()"
                  x-text="$store.modelRoles.saving ? $store.i18n.t('loading') : $store.i18n.t('roles_save')"></button>
        </div>
      </div>

      <div x-show="$store.providers.loading" class="flex flex-col items-center justify-center py-16 text-base-content/50 text-center gap-4">
  <span class="loading loading-spinner loading-md text-primary"></span>
  <span class="mt-2 text-sm" x-text="$store.i18n.t('loading')"></span>
</div>

      <div x-show="!$store.providers.loading && $store.providers.list.length === 0" class="flex flex-col items-center justify-center py-16 text-base-content/50 text-center gap-4">
        <div class="text-3xl mb-3">🤖</div>
        <div x-text="$store.i18n.t('providers_empty_title')"></div>
        <div class="text-sm text-base-content/60 mt-1"
             x-text="$store.i18n.t('providers_empty_hint')"></div>
      </div>

      <!-- 厂商卡片列表 -->
      <div class="grid gap-3">
        <template x-for="p in $store.providers.list" :key="p.id">
          <div class="card bg-base-200 shadow-sm border border-base-300 hover:border-primary transition-colors p-5" :class="{ disabled: !p.enabled }">
            <div class="flex items-center justify-between mb-4">
              <div>
                <span class="badge badge-sm badge-outline font-mono text-[10px]" x-text="$store.providers.typeLabel(p.type)"></span>
              </div>
              <label class="toggle">
                <input type="checkbox" :name="'provider-toggle-' + p.id" :checked="p.enabled" @change="$store.providers.toggle(p)">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="text-lg font-bold" x-text="p.name"></div>
            <div class="provider-meta">
              <span x-show="p.base_url" x-text="p.base_url" class="font-mono text-[11px]"></span>
              <span x-show="p.project_id" x-text="`项目: ${p.project_id}`"></span>
            </div>

            <!-- 模型列表 -->
            <div class="mt-2 border-t border-base-300 pt-2">
              <div class="text-[11px] text-base-content/60 mb-1">模型</div>
              <div x-show="!p.models || p.models.length === 0"
                   class="text-xs text-base-content/60 py-1">
                暂无模型，点击下方按钮添加
              </div>
              <div class="grid gap-1">
                <template x-for="m in (p.models || [])" :key="m.id">
                  <div class="flex items-center gap-2 p-1.5 px-2 bg-base-200 rounded-box text-xs">
                    <span class="flex-1 font-mono" x-text="m.model_id"></span>
                    <span :class="m.role === \'default\' ? \'badge badge-primary badge-xs font-bold\' : m.role === \'reasoning\' ? \'badge badge-secondary badge-xs font-bold\' : \'badge badge-ghost badge-xs font-bold\'"
                          x-text="$store.providers.roleLabel(m.role)"></span>
                    <label class="toggle" class="scale-75 origin-center">
                      <input type="checkbox" :name="'model-toggle-' + m.model_id" :checked="m.enabled" @change="$store.providers.toggleModel(p.id, m)">
                      <span class="toggle-slider"></span>
                    </label>
                    <button class="btn btn-ghost btn-sm" class="px-1 text-[11px]"
                            @click="$store.providers.openEditModel(p.id, m)">编辑</button>
                    <button class="btn btn-ghost btn-sm" class="px-1 text-[11px] text-error"
                            @click="$store.providers.removeModel(p.id, m.id)">删除</button>
                  </div>
                </template>
              </div>
              <button class="btn btn-ghost btn-sm" class="mt-1 text-[11px]"
                      @click="$store.providers.openAddModel(p.id)">+ 添加模型</button>
            </div>

            <div class="flex items-center justify-end gap-2 mt-4 pt-4 border-t border-base-300">
              <button class="btn btn-ghost btn-sm" @click="$store.providers.test(p.id)"
                :disabled="$store.providers.testingID === p.id">
                <span x-show="$store.providers.testingID === p.id" class="spinner" class="w-3 h-3"></span>
                <span x-show="$store.providers.testingID !== p.id" x-text="$store.i18n.t('providers_test')"></span>
              </button>
              <button class="btn btn-ghost btn-sm" @click="$store.providers.openEdit(p)"
                      x-text="$store.i18n.t('providers_edit')"></button>
              <button class="btn btn-ghost btn-sm" class="text-error"
                @click="confirm($store.i18n.t('providers_confirm_del')) && $store.providers.remove(p.id)"
                x-text="$store.i18n.t('providers_delete')"></button>
            </div>
          </div>
        </template>
      </div>

      <!-- 厂商凭据编辑 Modal -->
      <dialog class="modal" :class="{ 'modal-open': $store.providers.showModal }">
        <div class="modal-box max-w-2xl">
          <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" @click="$store.providers.showModal=false">✕</button>
          </form>
          <h3 class="font-bold text-lg mb-4 pb-3 border-b border-base-200" x-text="$store.providers.editMode === 'create' ? $store.i18n.t('providers_modal_create') : $store.i18n.t('providers_modal_edit')"></h3>
          
          <div class="py-2 flex flex-col gap-3">
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('providers_type')"></span></div>
              <select id="provider-type" name="provider-type" class="select select-bordered w-full" x-model="$store.providers.form.type">
                <option value="openai_compat">OpenAI 兼容（OpenAI / DeepSeek / Moonshot / Qwen / Groq）</option>
                <option value="anthropic">Anthropic Claude</option>
                <option value="google_agent_platform">Google Agent Platform（Gemini / GEAP）</option>
                <option value="ollama">Ollama（本地）</option>
              </select>
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('providers_name')"></span></div>
              <input id="provider-name" name="provider-name" class="input input-bordered w-full" type="text" x-model="$store.providers.form.name" :placeholder="$store.i18n.t('providers_name_hint')" />
            </label>
            <template x-if="$store.providers.form.type === 'openai_compat' || $store.providers.form.type === 'ollama'">
              <div class="flex flex-col gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Base URL</span></div>
                  <input id="provider-base-url" name="provider-base-url" class="input input-bordered w-full" type="url" x-model="$store.providers.form.base_url"
                    :placeholder="$store.providers.form.type === 'ollama' ? 'http://localhost:11434' : 'https://api.openai.com'" />
                </label>
                <label class="form-control w-full" x-show="$store.providers.form.type !== 'ollama'">
                  <div class="label"><span class="label-text font-medium">API Key</span></div>
                  <input id="provider-api-key-compat" name="provider-api-key-compat" class="input input-bordered w-full" type="password" x-model="$store.providers.form.api_key" placeholder="sk-..." />
                </label>
              </div>
            </template>
            <template x-if="$store.providers.form.type === 'anthropic'">
              <label class="form-control w-full">
                <div class="label"><span class="label-text font-medium">API Key</span></div>
                <input id="provider-api-key-anthropic" name="provider-api-key-anthropic" class="input input-bordered w-full" type="password" x-model="$store.providers.form.api_key" placeholder="sk-ant-..." />
              </label>
            </template>
            <template x-if="$store.providers.form.type === 'google_agent_platform'">
              <div class="flex flex-col gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">API Key</span></div>
                  <input id="provider-api-key-google" name="provider-api-key-google" class="input input-bordered w-full" type="password" x-model="$store.providers.form.api_key"
                    placeholder="AI Studio / GEAP API Key" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">GCP Project ID <span class="text-[11px] text-base-content/60 font-normal">（可选，GEAP 企业端点）</span></span></div>
                  <input id="provider-project-id" name="provider-project-id" class="input input-bordered w-full" type="text" x-model="$store.providers.form.project_id" placeholder="my-project-123" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Region / Location <span class="text-[11px] text-base-content/60 font-normal">（可选，默认 us-central1）</span></span></div>
                  <input id="provider-location" name="provider-location" class="input input-bordered w-full" type="text" x-model="$store.providers.form.location" placeholder="us-central1" />
                </label>
                <div class="text-xs text-base-content/60" x-text="$store.i18n.t('google_hint_no_project')"></div>
              </div>
            </template>
            <div class="form-control mt-4 w-max">
              <label class="cursor-pointer label gap-2">
                <input type="checkbox" name="provider-enabled" class="toggle toggle-primary" x-model="$store.providers.form.enabled">
                <span class="label-text" x-text="$store.i18n.t('providers_enabled')"></span>
              </label>
            </div>
          </div>
          <div class="modal-action">
            <button class="btn btn-ghost" @click="$store.providers.showModal=false"
                    x-text="$store.i18n.t('providers_cancel')"></button>
            <button class="btn btn-primary" @click="$store.providers.save()"
                    x-text="$store.i18n.t('providers_save')"></button>
          </div>
        </div>
        <form method="dialog" class="modal-backdrop">
          <button @click="$store.providers.showModal=false">close</button>
        </form>
      </dialog>

      <!-- 模型条目编辑 Modal -->
      <dialog class="modal" :class="{ 'modal-open': $store.providers.showModelModal }">
        <div class="modal-box">
          <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" @click="$store.providers.showModelModal=false">✕</button>
          </form>
          <h3 class="font-bold text-lg mb-4 pb-3 border-b border-base-200" x-text="$store.providers.modelEditMode === 'create' ? '添加模型' : '编辑模型'"></h3>
          <div class="py-2 flex flex-col gap-3">
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium">模型 ID</span></div>
              <input id="model-model-id" name="model-model-id" class="input input-bordered w-full" type="text" x-model="$store.providers.modelForm.model_id"
                placeholder="例：deepseek-chat / gpt-4o / claude-opus-4-7" />
              <div class="label pb-0"><span class="label-text-alt text-base-content/60">厂商文档中的模型名称，用于 API 调用</span></div>
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium">显示名称 <span class="text-[11px] text-base-content/60 font-normal">（可选，默认同模型 ID）</span></span></div>
              <input id="model-name" name="model-name" class="input input-bordered w-full" type="text" x-model="$store.providers.modelForm.name"
                placeholder="例：DeepSeek V3 对话" />
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium">路由角色</span></div>
              <select id="model-role" name="model-role" class="select select-bordered w-full" x-model="$store.providers.modelForm.role">
                <option value="general">通用（参与全局负载均衡）</option>
                <option value="default">对话模型（快速，日常对话优先）</option>
                <option value="reasoning">推理模型（深度，复杂任务优先）</option>
              </select>
              <div class="label pb-0"><span class="label-text-alt text-base-content/60">default / reasoning 角色全局唯一，设置后原同角色模型自动降为通用</span></div>
            </label>
            <div class="form-control mt-4 w-max">
              <label class="cursor-pointer label gap-2">
                <input type="checkbox" name="model-enabled" class="toggle toggle-primary" x-model="$store.providers.modelForm.enabled">
                <span class="label-text">启用</span>
              </label>
            </div>
          </div>
          <div class="modal-action">
            <button class="btn btn-ghost" @click="$store.providers.showModelModal=false">取消</button>
            <button class="btn btn-primary" @click="$store.providers.saveModel()">保存</button>
          </div>
        </div>
        <form method="dialog" class="modal-backdrop">
          <button @click="$store.providers.showModelModal=false">close</button>
        </form>
      </dialog>
    </div><!-- /providers -->
