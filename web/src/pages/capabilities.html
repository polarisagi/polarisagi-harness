<!-- 能力页（Tab：Agent | 技能）-->
    <div x-show="$store.nav.page === 'capabilities'" x-cloak class="flex flex-col h-full overflow-hidden p-0"
         x-data="{ tab: 'agents', _skillsLoaded: false }">

      <!-- Tab 导航条 -->
      <div class="px-6 pt-6">
        <div role="tablist" class="tabs tabs-boxed gap-1 bg-transparent p-0">
          <a role="tab" class="tab" :class="{ 'tab-active font-bold bg-base-200 shadow-sm': tab === 'agents' }" @click="tab = 'agents'"
                  x-text="$store.i18n.t('nav_agents')"></a>
          <a role="tab" class="tab" :class="{ 'tab-active font-bold bg-base-200 shadow-sm': tab === 'skills' }"
                  @click="tab = 'skills'; if (!_skillsLoaded) { $store.skills.load(); _skillsLoaded = true }"
                  x-text="$store.i18n.t('nav_skills')"></a>
        </div>
      </div>

      <!-- ── Agent 状态 Tab ─────────────────────────────── -->
      <div x-show="tab === 'agents'" class="flex-1 min-h-0 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto w-full flex flex-col flex-1">
        <div class="flex items-center justify-between mb-6">
          <div>
            <div class="text-2xl font-bold text-base-content" x-text="$store.i18n.t('agents_title')"></div>
            <div class="text-sm text-base-content/70 mt-1" x-text="$store.i18n.t('agents_subtitle')"></div>
          </div>
          <button class="btn btn-ghost btn-sm" @click="$store.agents.load()"
                  x-text="$store.agents.loading ? $store.i18n.t('loading') : $store.i18n.t('agents_refresh')"></button>
        </div>

        <div x-show="$store.agents.loading" class="flex flex-col items-center justify-center p-12 text-base-content/50">
          <div class="loading loading-spinner w-8 h-8 mx-auto mb-3"></div>
          <p x-text="$store.i18n.t('loading')"></p>
        </div>

        <template x-if="!$store.agents.loading">
          <div>
            <div class="grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-3 mb-5">

              <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col col-span-2">
                <div class="text-[13px] font-semibold mb-2.5" x-text="$store.i18n.t('agents_status')"></div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <div class="text-xs text-base-content/70" x-text="$store.i18n.t('agents_id')"></div>
                    <div class="text-sm font-mono mt-0.5" x-text="$store.agents.agentID || '—'"></div>
                  </div>
                  <div>
                    <div class="text-xs text-base-content/70" x-text="$store.i18n.t('agents_state')"></div>
                    <div class="text-sm font-semibold mt-0.5 flex items-center gap-1.5">
                      <span class="w-2 h-2 rounded-full" :class="$store.agents.agentState === 'idle' || $store.agents.agentState === 'complete' ? 'bg-success' : 'bg-warning'"></span>
                      <span x-text="$store.agents.stateLabel($store.agents.agentState)"></span>
                    </div>
                  </div>
                </div>
                <div class="mt-3.5">
                  <div class="text-xs text-base-content/70 mb-1.5" x-text="$store.i18n.t('agents_config')"></div>
                  <div class="flex gap-3 flex-wrap text-xs">
                    <span class="bg-base-100 border border-base-300 px-2 py-0.5 rounded-md">
                      <span class="text-base-content/70" x-text="$store.i18n.t('agents_max_replan') + ':'"></span>
                      <span class="font-semibold ml-1" x-text="$store.agents.agentConfig.max_replan ?? '—'"></span>
                    </span>
                    <span class="bg-base-100 border border-base-300 px-2 py-0.5 rounded-md">
                      <span class="text-base-content/70" x-text="$store.i18n.t('agents_max_steps') + ':'"></span>
                      <span class="font-semibold ml-1" x-text="$store.agents.agentConfig.max_steps ?? '—'"></span>
                    </span>
                    <span class="bg-base-100 border border-base-300 px-2 py-0.5 rounded-md">
                      <span class="text-base-content/70" x-text="$store.i18n.t('agents_default_budget') + ':'"></span>
                      <span class="font-semibold ml-1" x-text="$store.agents.agentConfig.default_budget ?? '—'"></span>
                    </span>
                  </div>
                </div>
              </div>

              <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
                <div class="text-[13px] font-semibold text-base-content" x-text="$store.i18n.t('agents_tools')"></div>
                <div class="text-xl mt-2" x-text="$store.agents.tools.length"></div>
                <div class="text-xs text-base-content/70 mt-1" x-text="$store.i18n.t('agents_tools_count')"></div>
              </div>

              <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
                <div class="text-[13px] font-semibold text-base-content" x-text="$store.i18n.t('agents_skills')"></div>
                <div class="text-xl mt-2" x-text="$store.agents.skills.length"></div>
                <div class="text-xs text-base-content/70 mt-1" x-text="$store.i18n.t('agents_skills_count')"></div>
              </div>

              <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
                <div class="text-[13px] font-semibold text-base-content" x-text="$store.i18n.t('agents_mcp')"></div>
                <div class="text-xl mt-2" x-text="$store.agents.mcpServers.length"></div>
                <div class="text-xs text-base-content/70 mt-1" x-text="$store.i18n.t('agents_mcp_count')"></div>
              </div>

              <div class="bg-base-200 border border-base-300 rounded-box p-4 flex flex-col">
                <div class="text-[13px] font-semibold text-base-content" x-text="$store.i18n.t('agents_channels')"></div>
                <div class="text-xl mt-2" x-text="$store.agents.channels.filter(c=>c.enabled).length"></div>
                <div class="text-xs text-base-content/70 mt-1" x-text="$store.i18n.t('agents_channels_count')"></div>
              </div>
            </div>

            <div class="bg-base-200 border border-base-300 rounded-box p-4 mb-4">
              <div class="font-semibold text-[13px] mb-3">
                <span x-text="$store.i18n.t('agents_mcp')"></span>
                <span class="text-xs text-base-content/70 font-normal ml-2" x-text="`(${$store.agents.mcpServers.length})`"></span>
              </div>
              <div x-show="$store.agents.mcpServers.length === 0" class="text-base-content/70 text-xs py-2">
                暂无 MCP 服务器，请前往「插件目录」安装。
              </div>
              <div class="grid gap-1.5">
                <template x-for="srv in $store.agents.mcpServers" :key="srv.id">
                  <div class="flex items-center gap-2.5 px-3 py-2 bg-base-100 border border-base-300 rounded-lg text-xs">
                    <span class="w-2 h-2 rounded-full" :class="srv.connected ? 'bg-success' : 'bg-error'"></span>
                    <span class="font-semibold flex-1" x-text="srv.name"></span>
                    <span class="text-base-content/70 font-mono text-[11px]" x-text="srv.transport"></span>
                    <span x-show="srv.tool_count > 0" class="bg-base-200 px-1.5 py-px rounded-md text-[10px]" x-text="`${srv.tool_count} 工具`"></span>
                    <span class="text-[11px]" :class="srv.connected ? 'text-success' : 'text-error'"
                          x-text="srv.connected ? $store.i18n.t('agents_connected') : $store.i18n.t('agents_disconnected')"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="bg-base-200 border border-base-300 rounded-box p-4 mb-4">
              <div class="font-semibold text-[13px] mb-3">
                <span x-text="$store.i18n.t('agents_tools')"></span>
                <span class="text-xs text-base-content/70 font-normal ml-2" x-text="`(${$store.agents.tools.length})`"></span>
              </div>
              <div x-show="$store.agents.tools.length === 0" class="text-base-content/70 text-xs py-2" x-text="$store.i18n.t('cap_no_tools')"></div>
              <div class="grid gap-1">
                <template x-for="t in $store.agents.tools" :key="t.name">
                  <div class="flex items-center gap-2 px-2.5 py-1.5 bg-base-100 rounded-md text-xs">
                    <span class="font-semibold flex-1" x-text="t.name"></span>
                    <span class="text-base-content/70 text-[11px] max-w-[300px] truncate" x-text="t.description || ''"></span>
                    <span class="px-1.5 py-px rounded text-[10px] bg-base-200 text-base-content/70 uppercase" x-text="t.source || 'builtin'"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="bg-base-200 border border-base-300 rounded-box p-4">
              <div class="font-semibold text-[13px] mb-3">
                <span x-text="$store.i18n.t('agents_skills')"></span>
                <span class="text-xs text-base-content/70 font-normal ml-2" x-text="`(${$store.agents.skills.length})`"></span>
              </div>
              <div x-show="$store.agents.skills.length === 0" class="text-base-content/70 text-xs py-2" x-text="$store.i18n.t('cap_no_skills')"></div>
              <div class="grid gap-1">
                <template x-for="sk in $store.agents.skills" :key="sk.name">
                  <div class="flex items-center gap-2 px-2.5 py-1.5 bg-base-100 rounded-md text-xs">
                    <span class="font-semibold flex-1" x-text="sk.name"></span>
                    <span class="text-base-content/70 text-[11px] max-w-[200px] truncate" x-text="sk.description || ''"></span>
                    <span class="px-1.5 py-px rounded text-[10px] bg-base-200 text-base-content/70" x-text="sk.version || 'v1'"></span>
                    <span x-show="sk.enabled" class="text-success text-[11px]" x-text="$store.i18n.t('cap_enable')"></span>
                    <span x-show="!sk.enabled" class="text-error text-[11px]" x-text="$store.i18n.t('cap_disable')"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        </div>
      </div><!-- /agents tab -->

      <!-- ── 技能库 Tab ─────────────────────────────────── -->
      <div x-show="tab === 'skills'" class="flex-1 min-h-0 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto w-full flex flex-col flex-1">
        <div class="flex items-center justify-between mb-6">
          <div>
            <div class="text-2xl font-bold text-base-content" x-text="$store.i18n.t('skills_title')"></div>
            <div class="text-sm text-base-content/70 mt-1" x-text="`已安装 ${$store.skills.list.length} 个技能`"></div>
          </div>
        </div>

        <div x-show="$store.skills.loading" class="flex flex-col items-center justify-center p-12 text-base-content/50">
          <div class="loading loading-spinner w-8 h-8 mx-auto mb-3"></div>
          <p x-text="$store.i18n.t('loading')"></p>
        </div>

        <div class="flex flex-col items-center justify-center p-12 text-base-content/50" x-show="!$store.skills.loading && $store.skills.list.length === 0">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" class="w-10 h-10 mb-4 opacity-50">
            <path stroke-linecap="round" stroke-linejoin="round" d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z"/>
          </svg>
          <h3 class="text-lg font-semibold text-base-content mb-1" x-text="$store.i18n.t('skills_empty_title')"></h3>
          <p class="text-sm" x-text="$store.i18n.t('skills_empty_hint')"></p>
        </div>

        <div class="grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-3">
          <template x-for="sk in $store.skills.list" :key="sk.id || sk.name">
            <div class="bg-base-200 hover:bg-base-300 transition-colors border border-base-300 rounded-box p-4 flex flex-col">
              <div class="text-3xl mb-3" x-text="sk.icon || '⚡'"></div>
              <div class="text-base font-bold text-base-content" x-text="sk.name"></div>
              <div class="text-xs text-base-content/70 mt-1 line-clamp-2" x-text="sk.description || '无描述'"></div>
              <div class="mt-2.5 flex flex-wrap gap-1">
                <span class="badge badge-sm bg-base-100 border-base-300 text-base-content/70 font-mono" x-text="sk.version || 'v1.0'"></span>
                <span class="badge badge-sm bg-success/20 text-success border-none" x-show="sk.enabled" x-text="$store.i18n.t('cap_enable')"></span>
              </div>
            </div>
          </template>
        </div>

        </div>
      </div><!-- /skills tab -->

    </div><!-- /capabilities -->
