<!-- 任务页（Tab：审批 | 定时）-->
    <div x-show="$store.nav.page === 'tasks'" x-cloak class="page-container flex flex-col overflow-hidden p-0"
         x-data="{ tab: 'approvals', _cronLoaded: false }">

      <!-- Tab 导航条 -->
      <div class="px-6 pt-6">
        <div role="tablist" class="tabs tabs-boxed gap-1 bg-transparent p-0">
          <a role="tab" class="tab" :class="{ 'tab-active font-bold bg-base-200 shadow-sm': tab === 'approvals' }" @click="tab = 'approvals'">
            <span x-text="$store.i18n.t('nav_approvals')"></span>
            <span x-show="$store.approvals.list.length > 0"
                  x-text="$store.approvals.list.length"
                  class="badge badge-sm badge-error ml-2 font-bold"></span>
          </a>
          <a role="tab" class="tab" :class="{ 'tab-active font-bold bg-base-200 shadow-sm': tab === 'cron' }"
                  @click="tab = 'cron'; if (!_cronLoaded) { $store.cron.load(); _cronLoaded = true }"
                  x-text="$store.i18n.t('nav_cron')"></a>
        </div>
      </div>

      <!-- ── 审批 Tab ──────────────────────────────────── -->
      <div x-show="tab === 'approvals'" class="flex-1 min-h-0 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto w-full flex flex-col flex-1">
        <div class="page-header">
          <div class="page-title" x-text="$store.i18n.t('approvals_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('approvals_subtitle')"></div>
        </div>

        <div class="warning-banner" x-show="$store.approvals.pollFailures >= 3" x-cloak
             x-text="$store.i18n.t('approvals_unreachable')">
        </div>

        <div class="empty-state" x-show="$store.approvals.list.length === 0 && $store.approvals.pollFailures < 3">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
          </svg>
          <h3 x-text="$store.i18n.t('approvals_empty_title')"></h3>
          <p x-text="$store.i18n.t('approvals_empty_hint')"></p>
        </div>

        <div class="flex flex-col gap-3">
          <template x-for="req in $store.approvals.list" :key="req.id">
            <div class="approval-card" :class="`risk-${req.risk_level || 'medium'}`"
                 x-data="{ remaining: 0, _ti: null, comment: '',
                   init() {
                     const tick = () => { this.remaining = req._remainingMs() }
                     tick(); this._ti = setInterval(tick, 1000)
                     this.$cleanup = () => clearInterval(this._ti)
                   }
                 }">
              <div class="approval-header">
                <div>
                  <div class="font-semibold mb-1" x-text="req.action"></div>
                  <div class="text-[11px] text-base-content/60" x-text="`Agent: ${req.agent_id || req.agentID}  ·  ${req.id?.slice(0,12)}`"></div>
                </div>
                <span class="risk-badge" :class="req.risk_level || 'medium'"
                      x-text="(req.risk_level || 'medium').toUpperCase()"></span>
              </div>

              <div class="approval-body">
                <p class="text-sm text-base-content/60 whitespace-pre-wrap" x-text="req.detail"></p>
                <div class="mt-2.5">
                  <input type="text" name="approval-comment" :aria-label="$store.i18n.t('tasks_approval_note')" :placeholder="$store.i18n.t('tasks_note_optional')" x-model="comment"
                    class="w-full px-2.5 py-1.5 bg-base-200 border border-base-300 rounded-box text-base-content text-xs focus:outline-none focus:border-primary" />
                </div>
              </div>

              <div class="approval-footer">
                <span class="countdown"
                  :class="remaining > 60000 ? 'ok' : remaining > 0 ? 'warn' : 'expired'"
                  x-text="remaining > 0
                    ? `⏱ ${Math.floor(remaining/60000)}:${String(Math.floor((remaining%60000)/1000)).padStart(2,'0')}`
                    : '⌛ 已超时'">
                </span>
                <div class="flex gap-2">
                  <button class="btn btn-danger btn-sm" @click="$store.approvals.resolve(req.id, 'deny', comment)"
                          x-text="$store.i18n.t('approvals_deny')"></button>
                  <button class="btn btn-primary btn-sm" :disabled="remaining <= 0"
                          @click="$store.approvals.resolve(req.id, 'approve', comment)"
                          x-text="$store.i18n.t('approvals_approve')"></button>
                </div>
              </div>
            </div>
          </template>
        </div>

        </div>
      </div><!-- /approvals tab -->

      <!-- ── 定时任务 Tab ────────────────────────────────── -->
      <div x-show="tab === 'cron'" class="flex-1 min-h-0 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto w-full flex flex-col flex-1">
        <div class="page-header">
          <div>
            <div class="page-title" x-text="$store.i18n.t('cron_title')"></div>
            <div class="page-subtitle" x-text="$store.i18n.t('cron_subtitle')"></div>
          </div>
          <button class="btn btn-primary btn-sm" @click="$store.cron.openCreate()"
                  x-text="$store.i18n.t('cron_add')"></button>
        </div>

        <div x-show="$store.cron.loading" class="empty-state" x-text="$store.i18n.t('loading')"></div>

        <div class="empty-state" x-show="!$store.cron.loading && $store.cron.list.length === 0">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
          </svg>
          <h3 x-text="$store.i18n.t('cron_empty_title')"></h3>
          <p x-text="$store.i18n.t('cron_empty_hint')"></p>
        </div>

        <div class="flex flex-col gap-2.5">
          <template x-for="job in $store.cron.list" :key="job.id">
            <div class="provider-card" :class="{ disabled: !job.enabled }">
              <div class="flex items-center justify-between mb-1.5">
                <div class="flex items-center gap-2.5">
                  <label class="cursor-pointer" @click.stop>
                    <input type="checkbox" :name="'cron-job-' + job.id" class="toggle toggle-primary toggle-sm" :checked="job.enabled" @change="$store.cron.toggle(job)">
                    <!-- <span class="toggle-slider"></span> -->
                  </label>
                  <span class="font-semibold text-sm" x-text="job.name || job.id.slice(0,12)"></span>
                  <span class="text-[11px] bg-base-200 px-2 py-0.5 rounded-full font-mono"
                        x-text="job.schedule"></span>
                </div>
                <div class="flex gap-1.5">
                  <button class="btn btn-ghost btn-sm" @click="$store.cron.openEdit(job)"
                          x-text="$store.i18n.t('cron_edit')"></button>
                  <button class="btn btn-danger btn-sm" @click="$store.cron.del(job.id)"
                          x-text="$store.i18n.t('cron_delete')"></button>
                </div>
              </div>
              <div class="text-xs text-base-content/60 mb-1.5 truncate"
                   x-text="job.prompt"></div>
              <div class="flex gap-4 text-[11px] text-base-content/60">
                <span x-text="`上次：${job.last_run_at ? new Date(job.last_run_at).toLocaleString('zh-CN') : $store.i18n.t('cron_never')}`"></span>
                <span x-text="`下次：${new Date(job.next_run_at).toLocaleString('zh-CN')}`"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- Cron Modal -->
        <div x-show="$store.cron.showModal" x-cloak
             class="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center"
             @click.self="$store.cron.showModal=false">
          <div class="bg-base-200 rounded-box p-6 w-[480px] max-w-[95vw] flex flex-col gap-3.5">
            <div class="font-bold text-base"
                 x-text="$store.cron.editMode==='create' ? $store.i18n.t('cron_add') : $store.i18n.t('cron_edit')"></div>

            <div>
              <label for="cron-name-t" class="form-label" x-text="$store.i18n.t('cron_name')"></label>
              <input type="text" id="cron-name-t" name="cron-name" class="form-input" x-model="$store.cron.form.name" :placeholder="$store.i18n.t('tasks_daily_review')" />
            </div>
            <div>
              <label for="cron-schedule-t" class="form-label" x-text="$store.i18n.t('cron_schedule')"></label>
              <input type="text" id="cron-schedule-t" name="cron-schedule" class="form-input" x-model="$store.cron.form.schedule" placeholder="@daily" />
              <div class="text-[11px] text-base-content/60 mt-1"
                   x-text="$store.i18n.t('cron_schedule_hint')"></div>
            </div>
            <div>
              <label for="cron-prompt-t" class="form-label" x-text="$store.i18n.t('cron_prompt')"></label>
              <textarea id="cron-prompt-t" name="cron-prompt" class="form-input" rows="4"
                        x-model="$store.cron.form.prompt"
                        :placeholder="$store.i18n.t('tasks_daily_plan')"
                        class="resize-y"></textarea>
            </div>
            <div class="flex items-center gap-2">
              <label class="cursor-pointer">
                <input type="checkbox" name="cron-enabled" class="toggle toggle-primary" x-model="$store.cron.form.enabled">
                <!-- <span class="toggle-slider"></span> -->
              </label>
              <span class="text-sm" x-text="$store.i18n.t('cron_enabled')"></span>
            </div>
            <div class="flex justify-end gap-2">
              <button class="btn btn-ghost btn-sm" @click="$store.cron.showModal=false"
                      x-text="$store.i18n.t('cancel')"></button>
              <button class="btn btn-primary btn-sm" @click="$store.cron.save()"
                      x-text="$store.i18n.t('cron_save')"></button>
            </div>
          </div>
        </div>

        </div>
      </div><!-- /cron tab -->

    </div><!-- /tasks -->
