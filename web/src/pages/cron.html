<!-- ─────── Cron 定时任务页 ────────────────────────── -->
    <div x-show="$store.nav.page === 'cron'" x-cloak class="page-container">
      <div class="page-header">
        <div>
          <div class="page-title" x-text="$store.i18n.t('cron_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('cron_subtitle')"></div>
        </div>
        <button class="btn btn-primary btn-sm" @click="$store.cron.openCreate()"
                x-text="$store.i18n.t('cron_add')"></button>
      </div>

      <div x-show="$store.cron.loading" class="empty-state" x-text="$store.i18n.t('loading')"></div>

      <div class="empty-state" x-show="!$store.cron.loading && $store.cron.list.length === 0">
        <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
        <h3 x-text="$store.i18n.t('cron_empty_title')"></h3>
        <p x-text="$store.i18n.t('cron_empty_hint')"></p>
      </div>

      <div class="flex flex-col gap-3">
        <template x-for="job in $store.cron.list" :key="job.id">
          <div class="provider-card" :class="{ disabled: !job.enabled }">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-3">
                <label class="cursor-pointer" @click.stop>
                  <input type="checkbox" :name="'cron-job-' + job.id" class="toggle toggle-primary toggle-sm" :checked="job.enabled" @change="$store.cron.toggle(job)">
                  <!-- <span class="toggle-slider"></span> -->
                </label>
                <span class="font-semibold text-sm" x-text="job.name || job.id.slice(0,12)"></span>
                <span class="text-[11px] bg-base-200 px-2 py-0.5 rounded-full font-mono"
                      x-text="job.schedule"></span>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-ghost btn-sm" @click="$store.cron.openEdit(job)"
                        x-text="$store.i18n.t('cron_edit')"></button>
                <button class="btn btn-danger btn-sm" @click="$store.cron.del(job.id)"
                        x-text="$store.i18n.t('cron_delete')"></button>
              </div>
            </div>
            <div class="text-xs text-base-content/60 mb-2 truncate"
                 x-text="job.prompt"></div>
            <div class="flex gap-4 text-[11px] text-base-content/60">
              <span x-text="`上次：${job.last_run_at ? new Date(job.last_run_at).toLocaleString('zh-CN') : $store.i18n.t('cron_never')}`"></span>
              <span x-text="`下次：${new Date(job.next_run_at).toLocaleString('zh-CN')}`"></span>
            </div>
          </div>
        </template>
      </div>

      <!-- Cron Modal -->
      <dialog class="modal" :class="{ 'modal-open': $store.cron.showModal }">
        <div class="modal-box">
          <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" @click="$store.cron.showModal=false">✕</button>
          </form>
          <h3 class="font-bold text-lg mb-4 pb-3 border-b border-base-200"
               x-text="$store.cron.editMode==='create' ? $store.i18n.t('cron_add') : $store.i18n.t('cron_edit')"></h3>

          <div class="py-2 flex flex-col gap-3">
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('cron_name')"></span></div>
              <input type="text" id="cron-name" name="cron-name" class="input input-bordered w-full" x-model="$store.cron.form.name" placeholder="每日回顾" />
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('cron_schedule')"></span></div>
              <input type="text" id="cron-schedule" name="cron-schedule" class="input input-bordered w-full" x-model="$store.cron.form.schedule" placeholder="@daily" />
              <div class="label pb-0"><span class="label-text-alt text-base-content/60" x-text="$store.i18n.t('cron_schedule_hint')"></span></div>
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium" x-text="$store.i18n.t('cron_prompt')"></span></div>
              <textarea id="cron-prompt" name="cron-prompt" class="textarea textarea-bordered w-full resize-y" rows="4"
                        x-model="$store.cron.form.prompt"
                        placeholder="请总结今天的工作进展，并提出明日计划…"></textarea>
            </label>
            <div class="form-control mt-2 w-max">
              <label class="cursor-pointer label gap-2">
                <input type="checkbox" name="cron-enabled" class="toggle toggle-primary" x-model="$store.cron.form.enabled">
                <span class="label-text" x-text="$store.i18n.t('cron_enabled')"></span>
              </label>
            </div>
          </div>
          <div class="modal-action">
            <button class="btn btn-ghost" @click="$store.cron.showModal=false"
                    x-text="$store.i18n.t('cancel')"></button>
            <button class="btn btn-primary" @click="$store.cron.save()"
                    x-text="$store.i18n.t('cron_save')"></button>
          </div>
        </div>
        <form method="dialog" class="modal-backdrop">
          <button @click="$store.cron.showModal=false">close</button>
        </form>
      </dialog>
    </div><!-- /cron -->
