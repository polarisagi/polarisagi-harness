<!-- 监控页（Tab：系统状态 | 用量洞察 | Agent）-->
    <div x-show="$store.nav.page === 'monitor'" x-cloak class="page-container flex flex-col"
         style="overflow:hidden;padding:0" x-data="{ tab: 'status', _insightsLoaded: false, _agentsLoaded: false }">

      <!-- Tab 导航条 -->
      <div class="tab-bar" style="padding:0 24px">
        <button class="tab-btn" :class="{ active: tab === 'status' }" @click="tab = 'status'"
                x-text="$store.i18n.t('nav_status')"></button>
        <button class="tab-btn" :class="{ active: tab === 'insights' }"
                @click="tab = 'insights'; if (!_insightsLoaded) { $store.insights.load(); _insightsLoaded = true }"
                x-text="$store.i18n.t('nav_insights')"></button>
        <button class="tab-btn" :class="{ active: tab === 'agents' }"
                @click="tab = 'agents'; if (!_agentsLoaded) { $store.agents.load(); _agentsLoaded = true }"
                x-text="$store.i18n.t('nav_agents')"></button>
      </div>

      <!-- ── 系统状态 Tab ──────────────────────────────── -->
      <div x-show="tab === 'status'" style="flex:1;min-height:0;overflow-y:auto;padding:24px"
           x-data="{
             metrics: {},
             async load() {
               try {
                 const r = await fetch('/v1/status')
                 if (r.ok) this.metrics = await r.json()
               } catch {}
             },
             init() { this.load(); setInterval(() => this.load(), 10000) }
           }">
        <div class="max-w-5xl mx-auto w-full flex flex-col min-h-full">
        <div class="page-header">
          <div class="page-title" x-text="$store.i18n.t('status_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('status_subtitle')"></div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px">

          <div class="metric-card">
            <div class="metric-label" x-text="$store.i18n.t('status_conn')"></div>
            <div class="metric-value" style="font-size:16px;margin-top:8px;display:flex;align-items:center;gap:8px">
              <span class="status-dot" :class="$store.statusBar.connected ? 'ok' : 'error'"></span>
              <span x-text="$store.statusBar.connected ? $store.i18n.t('status_conn_ok') : $store.i18n.t('status_conn_fail')"></span>
            </div>
          </div>

          <div class="metric-card">
            <div class="metric-label" x-text="$store.i18n.t('status_model')"></div>
            <div class="metric-value" style="font-size:13px;margin-top:8px;word-break:break-all"
                 x-text="$store.statusBar.modelID || metrics.model_id || '—'"></div>
          </div>

          <div class="metric-card">
            <div class="metric-label" x-text="$store.i18n.t('status_token')"></div>
            <div class="metric-value" x-text="$store.statusBar.tokenUsed.toLocaleString()"></div>
            <div class="metric-bar">
              <div class="metric-bar-fill"
                   :class="$store.statusBar.tokenPct > 0.95 ? 'error' : $store.statusBar.tokenPct > 0.80 ? 'warn' : ''"
                   :style="`width:${Math.round($store.statusBar.tokenPct*100)}%`"></div>
            </div>
            <div class="metric-label" style="margin-top:4px"
                 x-text="`/ ${$store.statusBar.tokenLimit.toLocaleString()}  (${Math.round($store.statusBar.tokenPct*100)}%)`"></div>
          </div>

          <div class="metric-card">
            <div class="metric-label" x-text="$store.i18n.t('status_memory')"></div>
            <div class="metric-value" x-text="`${$store.statusBar.memoryMB} MB`"></div>
            <div class="metric-bar">
              <div class="metric-bar-fill"
                   :class="$store.statusBar.memPct > 0.9 ? 'error' : $store.statusBar.memPct > 0.75 ? 'warn' : ''"
                   :style="`width:${Math.round($store.statusBar.memPct*100)}%`"></div>
            </div>
            <div class="metric-label" style="margin-top:4px"
                 x-text="`/ ${$store.statusBar.memoryLimitMB} MB  (${Math.round($store.statusBar.memPct*100)}%)`"></div>
          </div>

          <div class="metric-card">
            <div class="metric-label" x-text="$store.i18n.t('status_cost')"></div>
            <div class="metric-value" x-text="`¥ ${$store.statusBar.costCNY.toFixed(4)}`"></div>
          </div>

          <div class="metric-card">
            <div class="metric-label" x-text="$store.i18n.t('status_service')"></div>
            <div class="metric-value" style="font-size:13px;margin-top:8px">
              <span x-show="$store.statusBar.sealed" style="color:var(--color-critical);font-weight:700"
                    x-text="$store.i18n.t('status_sealed')"></span>
              <span x-show="!$store.statusBar.sealed" style="color:var(--color-ok)"
                    x-text="$store.i18n.t('status_running')"></span>
            </div>
          </div>
        </div>

        <!-- Doctor 健康检查 -->
        <div x-data="{
               checks: [],
               ok: true,
               loading: false,
               async run() {
                 this.loading = true
                 try {
                   const r = await fetch('/v1/doctor')
                   const d = await r.json()
                   this.checks = d.checks || []
                   this.ok = d.ok
                 } catch { } finally { this.loading = false }
               },
               init() { this.run() }
             }"
             style="margin-bottom:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-weight:600;font-size:13px" x-text="$store.i18n.t('monitor_diagnostics')"></div>
            <button class="btn btn-ghost btn-sm" @click="run()" :disabled="loading"
                    x-text="loading ? '检查中…' : '重新检查'"></button>
          </div>
          <div style="display:grid;gap:6px">
            <template x-for="c in checks" :key="c.name">
              <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:8px">
                <span :style="`color:${c.ok ? 'var(--color-ok)' : 'var(--color-critical)'}`"
                      x-text="c.ok ? '✓' : '✕'"></span>
                <span style="font-weight:600;font-size:12px;width:100px" x-text="c.name"></span>
                <span style="font-size:12px;color:var(--color-text-dim)" x-text="c.detail"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- /metrics 原始指标（折叠） -->
        <details style="border:1px solid var(--color-border);border-radius:8px;overflow:hidden">
          <summary style="padding:12px 16px;cursor:pointer;background:var(--color-surface-raised);font-size:13px;font-weight:600"
                   x-text="$store.i18n.t('status_metrics')">
          </summary>
          <div x-data="{ raw: '' }"
               x-init="fetch('/metrics').then(r=>r.text()).then(t=>raw=t)"
               style="padding:16px;overflow-x:auto">
            <pre style="font-size:11px;color:var(--color-text-dim)" x-text="raw || $store.i18n.t('loading')"></pre>
          </div>
        </details>
        </div>
      </div><!-- /status tab -->

      <!-- ── 用量洞察 Tab ──────────────────────────────── -->
      <div x-show="tab === 'insights'" style="flex:1;min-height:0;overflow-y:auto;padding:24px">
        <div class="max-w-5xl mx-auto w-full flex flex-col min-h-full">
        <div class="page-header">
          <div>
            <div class="page-title" x-text="$store.i18n.t('insights_title')"></div>
            <div class="page-subtitle" x-text="$store.i18n.t('insights_subtitle')"></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <select name="insights-days" aria-label="统计周期" class="form-select" style="width:auto"
                    x-model.number="$store.insights.days" @change="$store.insights.load()">
              <option value="7" x-text="$store.i18n.t('monitor_7d')"></option>
              <option value="30" x-text="$store.i18n.t('monitor_30d')"></option>
              <option value="90" x-text="$store.i18n.t('monitor_90d')"></option>
            </select>
          </div>
        </div>

        <div x-show="$store.insights.loading" class="empty-state" x-text="$store.i18n.t('loading')"></div>

        <template x-if="$store.insights.data && !$store.insights.loading">
          <div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px">
              <div class="metric-card">
                <div class="metric-label" x-text="$store.i18n.t('insights_total_sessions')"></div>
                <div class="metric-value" x-text="$store.insights.data.total_sessions.toLocaleString()"></div>
              </div>
              <div class="metric-card">
                <div class="metric-label" x-text="$store.i18n.t('insights_total_messages')"></div>
                <div class="metric-value" x-text="$store.insights.data.total_messages.toLocaleString()"></div>
              </div>
              <div class="metric-card">
                <div class="metric-label" x-text="`${$store.insights.data.period_days}天 会话`"></div>
                <div class="metric-value" x-text="$store.insights.data.period_sessions.toLocaleString()"></div>
              </div>
              <div class="metric-card">
                <div class="metric-label" x-text="`${$store.insights.data.period_days}天 消息`"></div>
                <div class="metric-value" x-text="$store.insights.data.period_messages.toLocaleString()"></div>
              </div>
            </div>

            <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:16px">
              <div style="font-weight:600;font-size:13px;margin-bottom:12px" x-text="$store.i18n.t('insights_role_breakdown')"></div>
              <div style="display:flex;gap:16px;flex-wrap:wrap">
                <template x-for="[role, cnt] in Object.entries($store.insights.data.role_breakdown || {})" :key="role">
                  <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:12px;padding:2px 8px;border-radius:12px;background:var(--color-surface)" x-text="role"></span>
                    <span style="font-weight:600" x-text="cnt.toLocaleString()"></span>
                  </div>
                </template>
              </div>
            </div>

            <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:16px">
              <div style="font-weight:600;font-size:13px;margin-bottom:12px" x-text="$store.i18n.t('insights_daily_trend')"></div>
              <div x-show="$store.insights.data.daily_trend.length === 0" style="color:var(--color-text-dim);font-size:12px" x-text="$store.i18n.t('monitor_no_data')"></div>
              <div style="display:flex;align-items:flex-end;gap:4px;height:80px;overflow-x:auto">
                <template x-for="d in $store.insights.data.daily_trend" :key="d.day">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:28px">
                    <div style="font-size:9px;color:var(--color-text-dim)" x-text="d.count"></div>
                    <div style="background:var(--color-primary);border-radius:3px 3px 0 0;width:18px;transition:height .2s"
                         :style="`height:${Math.round(d.count/$store.insights.maxDailyCount()*64)+4}px`"
                         :title="`${d.day}: ${d.count} 条`"></div>
                    <div style="font-size:9px;color:var(--color-text-dim);writing-mode:vertical-rl;text-orientation:mixed"
                         x-text="d.day.slice(5)"></div>
                  </div>
                </template>
              </div>
            </div>

            <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px">
              <div style="font-weight:600;font-size:13px;margin-bottom:12px" x-text="$store.i18n.t('insights_top_sessions')"></div>
              <div x-show="$store.insights.data.top_sessions.length === 0" style="color:var(--color-text-dim);font-size:12px" x-text="$store.i18n.t('monitor_no_data')"></div>
              <div style="display:flex;flex-direction:column;gap:6px">
                <template x-for="(sess, i) in $store.insights.data.top_sessions" :key="sess.id">
                  <div style="display:flex;align-items:center;gap:10px;cursor:pointer"
                       @click="Alpine.store('chat').loadSession(sess.id); Alpine.store('nav').navigate('chat')">
                    <span style="font-size:11px;color:var(--color-text-dim);width:20px;text-align:right" x-text="i+1"></span>
                    <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px"
                         x-text="sess.title || sess.id.slice(0,20)+'…'"></div>
                    <span style="font-size:11px;padding:2px 8px;background:var(--color-surface);border-radius:10px;flex-shrink:0"
                          x-text="`${sess.message_count} 条`"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        <div style="margin-top:16px;padding:14px 16px;background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-weight:600;font-size:13px" x-text="$store.i18n.t('monitor_export')"></div>
            <div style="font-size:12px;color:var(--color-text-dim);margin-top:2px" x-text="$store.i18n.t('monitor_export_desc')"></div>
          </div>
          <div style="display:flex;gap:8px" x-data="{fmt:'sharegpt',days:30}">
            <select name="export-format" aria-label="导出格式" class="form-select" style="width:auto;font-size:12px" x-model="fmt">
              <option value="sharegpt">ShareGPT</option>
              <option value="openai">OpenAI</option>
              <option value="raw">Raw JSON</option>
            </select>
            <a class="btn btn-ghost btn-sm"
               :href="`/v1/export/trajectories?format=${fmt}&days=${$store.insights.days}&min_turns=2`"
               download="trajectories.jsonl" x-text="$store.i18n.t('monitor_export_jsonl')"></a>
          </div>
        </div>

        </div>
      </div><!-- /insights tab -->

      <!-- ── Agent 状态 Tab ──────────────────────────────── -->
      <div x-show="tab === 'agents'" style="flex:1;min-height:0;overflow-y:auto;padding:24px">
        <div class="max-w-5xl mx-auto w-full flex flex-col min-h-full">
        <div class="page-header">
          <div>
            <div class="page-title" x-text="$store.i18n.t('agents_title')"></div>
            <div class="page-subtitle" x-text="$store.i18n.t('agents_subtitle')"></div>
          </div>
          <button class="btn btn-ghost btn-sm" @click="$store.agents.load()"
                  x-text="$store.agents.loading ? $store.i18n.t('loading') : $store.i18n.t('agents_refresh')"></button>
        </div>

        <div x-show="$store.agents.loading" class="empty-state">
          <div class="spinner" style="width:32px;height:32px;margin:0 auto 12px"></div>
          <p x-text="$store.i18n.t('loading')"></p>
        </div>

        <template x-if="!$store.agents.loading">
          <div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px">

              <div class="metric-card" style="grid-column:span 2">
                <div class="metric-label" style="font-size:13px;font-weight:600;margin-bottom:10px" x-text="$store.i18n.t('agents_status')"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                  <div>
                    <div style="font-size:11px;color:var(--color-text-dim)" x-text="$store.i18n.t('agents_id')"></div>
                    <div style="font-size:14px;font-family:monospace;margin-top:2px" x-text="$store.agents.agentID || '—'"></div>
                  </div>
                  <div>
                    <div style="font-size:11px;color:var(--color-text-dim)" x-text="$store.i18n.t('agents_state')"></div>
                    <div style="font-size:14px;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:6px">
                      <span class="status-dot" :class="$store.agents.agentState === 'idle' || $store.agents.agentState === 'complete' ? 'ok' : 'warn'"></span>
                      <span x-text="$store.agents.stateLabel($store.agents.agentState)"></span>
                    </div>
                  </div>
                </div>
                <div style="margin-top:14px">
                  <div style="font-size:11px;color:var(--color-text-dim);margin-bottom:6px" x-text="$store.i18n.t('agents_config')"></div>
                  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
                    <span style="background:var(--color-surface);padding:2px 8px;border-radius:6px">
                      <span style="color:var(--color-text-dim)" x-text="$store.i18n.t('agents_max_replan') + ':'"></span>
                      <span style="font-weight:600;margin-left:4px" x-text="$store.agents.agentConfig.max_replan ?? '—'"></span>
                    </span>
                    <span style="background:var(--color-surface);padding:2px 8px;border-radius:6px">
                      <span style="color:var(--color-text-dim)" x-text="$store.i18n.t('agents_max_steps') + ':'"></span>
                      <span style="font-weight:600;margin-left:4px" x-text="$store.agents.agentConfig.max_steps ?? '—'"></span>
                    </span>
                    <span style="background:var(--color-surface);padding:2px 8px;border-radius:6px">
                      <span style="color:var(--color-text-dim)" x-text="$store.i18n.t('agents_default_budget') + ':'"></span>
                      <span style="font-weight:600;margin-left:4px" x-text="$store.agents.agentConfig.default_budget ?? '—'"></span>
                    </span>
                  </div>
                </div>
              </div>

              <div class="metric-card">
                <div class="metric-label" x-text="$store.i18n.t('agents_tools')"></div>
                <div class="metric-value" style="font-size:20px" x-text="$store.agents.tools.length"></div>
                <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_tools_count')"></div>
              </div>

              <div class="metric-card">
                <div class="metric-label" x-text="$store.i18n.t('agents_skills')"></div>
                <div class="metric-value" style="font-size:20px" x-text="$store.agents.skills.length"></div>
                <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_skills_count')"></div>
              </div>

              <div class="metric-card">
                <div class="metric-label" x-text="$store.i18n.t('agents_mcp')"></div>
                <div class="metric-value" style="font-size:20px" x-text="$store.agents.mcpServers.length"></div>
                <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_mcp_count')"></div>
              </div>

              <div class="metric-card">
                <div class="metric-label" x-text="$store.i18n.t('agents_channels')"></div>
                <div class="metric-value" style="font-size:20px" x-text="$store.agents.channels.filter(c=>c.enabled).length"></div>
                <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_channels_count')"></div>
              </div>
            </div>

            <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:16px">
              <div style="font-weight:600;font-size:13px;margin-bottom:12px">
                <span x-text="$store.i18n.t('agents_mcp')"></span>
                <span style="font-size:11px;color:var(--color-text-dim);font-weight:400;margin-left:8px" x-text="`(${$store.agents.mcpServers.length})`"></span>
              </div>
              <div x-show="$store.agents.mcpServers.length === 0" style="color:var(--color-text-dim);font-size:12px;padding:8px 0"
                   x-text="$store.i18n.t('agents_no_mcp')"></div>
              <div style="display:grid;gap:6px">
                <template x-for="srv in $store.agents.mcpServers" :key="srv.id">
                  <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:8px;font-size:12px">
                    <span class="status-dot" :class="srv.connected ? 'ok' : 'error'"></span>
                    <span style="font-weight:600;flex:1" x-text="srv.name"></span>
                    <span style="color:var(--color-text-dim);font-family:monospace;font-size:11px" x-text="srv.transport"></span>
                    <span x-show="srv.tool_count > 0" style="background:var(--color-surface-raised);padding:1px 6px;border-radius:10px;font-size:10px"
                          x-text="`${srv.tool_count} 工具`"></span>
                    <span :style="`color:${srv.connected ? 'var(--color-ok)' : 'var(--color-error)'};font-size:11px`"
                          x-text="srv.connected ? $store.i18n.t('agents_connected') : $store.i18n.t('agents_disconnected')"></span>
                  </div>
                </template>
              </div>
            </div>

            <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:16px">
              <div style="font-weight:600;font-size:13px;margin-bottom:12px">
                <span x-text="$store.i18n.t('agents_tools')"></span>
                <span style="font-size:11px;color:var(--color-text-dim);font-weight:400;margin-left:8px" x-text="`(${$store.agents.tools.length})`"></span>
              </div>
              <div x-show="$store.agents.tools.length === 0" style="color:var(--color-text-dim);font-size:12px;padding:8px 0" x-text="$store.i18n.t('cap_no_tools')"></div>
              <div style="display:grid;gap:4px">
                <template x-for="t in $store.agents.tools" :key="t.name">
                  <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-surface);border-radius:6px;font-size:12px">
                    <span style="font-weight:600;flex:1" x-text="t.name"></span>
                    <span style="color:var(--color-text-dim);font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="t.description || ''"></span>
                    <span style="padding:1px 6px;border-radius:4px;font-size:10px;background:var(--color-surface-raised);color:var(--color-text-dim);text-transform:uppercase" x-text="t.source || 'builtin'"></span>
                  </div>
                </template>
              </div>
            </div>

            <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px">
              <div style="font-weight:600;font-size:13px;margin-bottom:12px">
                <span x-text="$store.i18n.t('agents_skills')"></span>
                <span style="font-size:11px;color:var(--color-text-dim);font-weight:400;margin-left:8px" x-text="`(${$store.agents.skills.length})`"></span>
              </div>
              <div x-show="$store.agents.skills.length === 0" style="color:var(--color-text-dim);font-size:12px;padding:8px 0" x-text="$store.i18n.t('cap_no_skills')"></div>
              <div style="display:grid;gap:4px">
                <template x-for="sk in $store.agents.skills" :key="sk.name">
                  <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-surface);border-radius:6px;font-size:12px">
                    <span style="font-weight:600;flex:1" x-text="sk.name"></span>
                    <span style="color:var(--color-text-dim);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="sk.description || ''"></span>
                    <span style="padding:1px 6px;border-radius:4px;font-size:10px;background:var(--color-surface-raised);color:var(--color-text-dim)" x-text="sk.version || 'v1'"></span>
                    <span x-show="sk.enabled" style="color:var(--color-ok);font-size:11px" x-text="$store.i18n.t('cap_enable')"></span>
                    <span x-show="!sk.enabled" style="color:var(--color-error);font-size:11px" x-text="$store.i18n.t('cap_disable')"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        </div>
      </div><!-- /agents tab -->

    </div><!-- /monitor -->
