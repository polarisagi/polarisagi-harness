<!-- ─────── Agent 状态页 ────────────────────────────── -->
    <div x-show="$store.nav.page === 'agents'" x-cloak class="page-container">
      <div class="page-header">
        <div>
          <div class="page-title" x-text="$store.i18n.t('agents_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('agents_subtitle')"></div>
        </div>
        <button class="btn btn-ghost btn-sm" @click="$store.agents.load()"
                x-text="$store.agents.loading ? $store.i18n.t('loading') : $store.i18n.t('agents_refresh')"></button>
      </div>

      <div x-show="$store.agents.loading" class="empty-state">
        <div class="spinner" style="width:32px;height:32px;margin:0 auto 12px"></div>
        <p x-text="$store.i18n.t('loading')"></p>
      </div>

      <template x-if="!$store.agents.loading">
        <div>
          <!-- 状态卡片 + 统计卡片网格 -->
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px">

            <!-- Agent 状态卡片 -->
            <div class="metric-card" style="grid-column:span 2">
              <div class="metric-label" style="font-size:13px;font-weight:600;margin-bottom:10px" x-text="$store.i18n.t('agents_status')"></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                  <div style="font-size:11px;color:var(--color-text-dim)" x-text="$store.i18n.t('agents_id')"></div>
                  <div style="font-size:14px;font-family:monospace;margin-top:2px" x-text="$store.agents.agentID || '—'"></div>
                </div>
                <div>
                  <div style="font-size:11px;color:var(--color-text-dim)" x-text="$store.i18n.t('agents_state')"></div>
                  <div style="font-size:14px;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:6px">
                    <span class="status-dot" :class="$store.agents.agentState === 'idle' || $store.agents.agentState === 'complete' ? 'ok' : 'warn'"></span>
                    <span x-text="$store.agents.stateLabel($store.agents.agentState)"></span>
                  </div>
                </div>
              </div>
              <div style="margin-top:14px">
                <div style="font-size:11px;color:var(--color-text-dim);margin-bottom:6px" x-text="$store.i18n.t('agents_config')"></div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
                  <span style="background:var(--color-surface);padding:2px 8px;border-radius:6px">
                    <span style="color:var(--color-text-dim)" x-text="$store.i18n.t('agents_max_replan') + ':'"></span>
                    <span style="font-weight:600;margin-left:4px" x-text="$store.agents.agentConfig.max_replan ?? '—'"></span>
                  </span>
                  <span style="background:var(--color-surface);padding:2px 8px;border-radius:6px">
                    <span style="color:var(--color-text-dim)" x-text="$store.i18n.t('agents_max_steps') + ':'"></span>
                    <span style="font-weight:600;margin-left:4px" x-text="$store.agents.agentConfig.max_steps ?? '—'"></span>
                  </span>
                  <span style="background:var(--color-surface);padding:2px 8px;border-radius:6px">
                    <span style="color:var(--color-text-dim)" x-text="$store.i18n.t('agents_default_budget') + ':'"></span>
                    <span style="font-weight:600;margin-left:4px" x-text="$store.agents.agentConfig.default_budget ?? '—'"></span>
                  </span>
                </div>
              </div>
            </div>

            <!-- 统计卡片 -->
            <div class="metric-card">
              <div class="metric-label" x-text="$store.i18n.t('agents_tools')"></div>
              <div class="metric-value" style="font-size:20px" x-text="$store.agents.tools.length"></div>
              <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_tools_count')"></div>
            </div>

            <div class="metric-card">
              <div class="metric-label" x-text="$store.i18n.t('agents_skills')"></div>
              <div class="metric-value" style="font-size:20px" x-text="$store.agents.skills.length"></div>
              <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_skills_count')"></div>
            </div>

            <div class="metric-card">
              <div class="metric-label" x-text="$store.i18n.t('agents_mcp')"></div>
              <div class="metric-value" style="font-size:20px" x-text="$store.agents.mcpServers.length"></div>
              <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_mcp_count')"></div>
            </div>

            <div class="metric-card">
              <div class="metric-label" x-text="$store.i18n.t('agents_channels')"></div>
              <div class="metric-value" style="font-size:20px" x-text="$store.agents.channels.filter(c=>c.enabled).length"></div>
              <div style="font-size:11px;color:var(--color-text-dim);margin-top:4px" x-text="$store.i18n.t('agents_channels_count')"></div>
            </div>
          </div>

          <!-- MCP 服务器列表 -->
          <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:16px">
            <div style="font-weight:600;font-size:13px;margin-bottom:12px">
              <span x-text="$store.i18n.t('agents_mcp')"></span>
              <span style="font-size:11px;color:var(--color-text-dim);font-weight:400;margin-left:8px" x-text="`(${$store.agents.mcpServers.length})`"></span>
            </div>
            <div x-show="$store.agents.mcpServers.length === 0" style="color:var(--color-text-dim);font-size:12px;padding:8px 0">
              暂无 MCP 服务器，请前往「插件目录」安装。
            </div>
            <div style="display:grid;gap:6px">
              <template x-for="srv in $store.agents.mcpServers" :key="srv.id">
                <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:8px;font-size:12px">
                  <span class="status-dot" :class="srv.connected ? 'ok' : 'error'"></span>
                  <span style="font-weight:600;flex:1" x-text="srv.name"></span>
                  <span style="color:var(--color-text-dim);font-family:monospace;font-size:11px" x-text="srv.transport"></span>
                  <span x-show="srv.tool_count > 0" style="background:var(--color-surface-raised);padding:1px 6px;border-radius:10px;font-size:10px" x-text="`${srv.tool_count} 工具`"></span>
                  <span :style="`color:${srv.connected ? 'var(--color-ok)' : 'var(--color-error)'};font-size:11px`"
                        x-text="srv.connected ? $store.i18n.t('agents_connected') : $store.i18n.t('agents_disconnected')"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- 工具列表 -->
          <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:16px">
            <div style="font-weight:600;font-size:13px;margin-bottom:12px">
              <span x-text="$store.i18n.t('agents_tools')"></span>
              <span style="font-size:11px;color:var(--color-text-dim);font-weight:400;margin-left:8px" x-text="`(${$store.agents.tools.length})`"></span>
            </div>
            <div x-show="$store.agents.tools.length === 0" style="color:var(--color-text-dim);font-size:12px;padding:8px 0">
              暂无已注册工具。
            </div>
            <div style="display:grid;gap:4px">
              <template x-for="t in $store.agents.tools" :key="t.name">
                <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-surface);border-radius:6px;font-size:12px">
                  <span style="font-weight:600;flex:1" x-text="t.name"></span>
                  <span style="color:var(--color-text-dim);font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="t.description || ''"></span>
                  <span style="padding:1px 6px;border-radius:4px;font-size:10px;background:var(--color-surface-raised);color:var(--color-text-dim);text-transform:uppercase" x-text="t.source || 'builtin'"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- 技能列表 -->
          <div style="background:var(--color-surface-raised);border:1px solid var(--color-border);border-radius:10px;padding:16px">
            <div style="font-weight:600;font-size:13px;margin-bottom:12px">
              <span x-text="$store.i18n.t('agents_skills')"></span>
              <span style="font-size:11px;color:var(--color-text-dim);font-weight:400;margin-left:8px" x-text="`(${$store.agents.skills.length})`"></span>
            </div>
            <div x-show="$store.agents.skills.length === 0" style="color:var(--color-text-dim);font-size:12px;padding:8px 0">
              暂无已安装技能。
            </div>
            <div style="display:grid;gap:4px">
              <template x-for="sk in $store.agents.skills" :key="sk.name">
                <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--color-surface);border-radius:6px;font-size:12px">
                  <span style="font-weight:600;flex:1" x-text="sk.name"></span>
                  <span style="color:var(--color-text-dim);font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="sk.description || ''"></span>
                  <span style="padding:1px 6px;border-radius:4px;font-size:10px;background:var(--color-surface-raised);color:var(--color-text-dim)" x-text="sk.version || 'v1'"></span>
                  <span x-show="sk.enabled" style="color:var(--color-ok);font-size:11px">启用</span>
                  <span x-show="!sk.enabled" style="color:var(--color-error);font-size:11px">禁用</span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div><!-- /agents -->

    <!-- ─────── 实时日志页 ─────────────────────────────── -->
    <div x-show="$store.nav.page === 'logs'" x-cloak class="page-container"
         x-data="{
           _el: null,
           init() {
             this.$nextTick(() => {
               this._el = document.getElementById('log-entries')
               if (!this._el) return
               const ro = new ResizeObserver(() => {
                 if ($store.logs.autoFollow) this._el.scrollTop = this._el.scrollHeight
               })
               ro.observe(this._el)
             })
           },
           scrollBottom() {
             if (this._el) this._el.scrollTop = this._el.scrollHeight
           }
         }">
      <div class="page-header">
        <div>
          <div class="page-title" x-text="$store.i18n.t('logs_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('logs_subtitle')"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <!-- 连接状态 -->
          <span class="status-dot" :class="$store.logs.connected ? 'ok' : 'error'"></span>
          <span style="font-size:12px" x-text="$store.logs.connected ? $store.i18n.t('logs_connected') : $store.i18n.t('logs_disconnected')"></span>
        </div>
      </div>

      <!-- 工具栏 -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <!-- 级别过滤 -->
        <span style="font-size:11px;color:var(--color-text-dim);font-weight:500"
              x-text="$store.i18n.t('logs_filter')"></span>
        <button class="btn btn-sm" style="padding:2px 10px;font-size:11px"
                :class="$store.logs.levelFilter === '' ? 'btn-primary' : 'btn-ghost'"
                @click="$store.logs.setLevel('')">ALL</button>
        <button class="btn btn-sm" style="padding:2px 10px;font-size:11px"
                :class="$store.logs.levelFilter === 'debug' ? 'btn-primary' : 'btn-ghost'"
                @click="$store.logs.setLevel('debug')" x-text="$store.i18n.t('logs_level_debug')"></button>
        <button class="btn btn-sm" style="padding:2px 10px;font-size:11px"
                :class="$store.logs.levelFilter === 'info' ? 'btn-primary' : 'btn-ghost'"
                @click="$store.logs.setLevel('info')" x-text="$store.i18n.t('logs_level_info')"></button>
        <button class="btn btn-sm" style="padding:2px 10px;font-size:11px"
                :class="$store.logs.levelFilter === 'warn' ? 'btn-primary' : 'btn-ghost'"
                @click="$store.logs.setLevel('warn')" x-text="$store.i18n.t('logs_level_warn')"></button>
        <button class="btn btn-sm" style="padding:2px 10px;font-size:11px"
                :class="$store.logs.levelFilter === 'error' ? 'btn-primary' : 'btn-ghost'"
                @click="$store.logs.setLevel('error')" x-text="$store.i18n.t('logs_level_error')"></button>

        <span style="flex:1"></span>

        <!-- 自动滚动 -->
        <label class="toggle" style="font-size:11px" :title="$store.i18n.t('logs_auto_follow')">
          <input type="checkbox" name="logs-auto-follow" x-model="$store.logs.autoFollow">
          <span class="toggle-slider" style="transform:scale(0.7)"></span>
        </label>
        <span style="font-size:11px;color:var(--color-text-dim)" x-text="$store.i18n.t('logs_auto_follow')"></span>

        <!-- 暂停/继续 -->
        <button class="btn btn-ghost btn-sm" @click="$store.logs.togglePause()"
                x-text="$store.logs.paused ? $store.i18n.t('logs_reconnect') : $store.i18n.t('logs_pause')"></button>

        <!-- 清空 -->
        <button class="btn btn-ghost btn-sm" @click="$store.logs.clear()"
                x-text="$store.i18n.t('logs_clear')"></button>
      </div>

      <!-- 日志条目列表 -->
      <div style="margin-top:4px;border:1px solid var(--color-border);border-radius:8px;overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:200px">
        <!-- 空状态 -->
        <div class="empty-state" x-show="$store.logs.entries.length === 0"
             style="min-height:200px;justify-content:center">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" style="width:40px;height:40px">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
          </svg>
          <h3 x-text="$store.i18n.t('logs_no_entries')"></h3>
          <p style="font-size:12px" x-show="!$store.logs.connected && $store.logs.entries.length === 0"
             x-text="$store.i18n.t('logs_reconnecting')"></p>
        </div>

        <!-- 日志行 -->
        <div id="log-entries"
             style="flex:1;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.6;padding:8px 0"
             x-init="$watch('$store.logs.entries.length', () => {
               $nextTick(() => { if ($store.logs.autoFollow && _el) _el.scrollTop = _el.scrollHeight })
             })">
          <template x-for="(entry, i) in $store.logs.filtered" :key="i">
            <div style="display:flex;gap:8px;padding:1px 12px;transition:background 0.1s"
                 :style="entry.level === 'error' ? 'background:rgba(239,68,68,0.06)' : entry.level === 'warn' ? 'background:rgba(234,179,8,0.06)' : ''"
                 @mouseenter="$el.style.background = 'var(--color-surface-raised)'"
                 @mouseleave="$el.style.background = entry.level === 'error' ? 'rgba(239,68,68,0.06)' : entry.level === 'warn' ? 'rgba(234,179,8,0.06)' : ''">
              <!-- 时间戳 -->
              <span style="color:var(--color-text-dim);flex-shrink:0;width:80px"
                    x-text="entry.time ? entry.time.slice(11,19) : ''"></span>
              <!-- 级别徽章 -->
              <span style="flex-shrink:0;width:44px;text-align:center;padding:0 4px;border-radius:3px;font-weight:600;font-size:10px;letter-spacing:0.03em"
                    :style="{
                      'debug':  'color:#6b7280;background:#374151',
                      'info':   'color:#3b82f6;background:#1e3a5f',
                      'warn':   'color:#f59e0b;background:#5c4a0b',
                      'error':  'color:#ef4444;background:#5c1a1a',
                    }[entry.level] || 'color:var(--color-text-dim);background:var(--color-surface)'"
                    x-text="entry.level.toUpperCase()"></span>
              <!-- 消息 -->
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                    x-text="entry.message"></span>
              <!-- 属性 -->
              <template x-if="entry.attrs && Object.keys(entry.attrs).length > 0">
                <span style="color:var(--color-text-dim);font-size:11px;flex-shrink:0;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                      x-text="JSON.stringify(entry.attrs)"></span>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div><!-- /logs -->

    <!-- ─────── 运行时配置页（只读视图） ────────────────── -->
    <div x-show="$store.nav.page === 'config'" x-cloak class="page-container">
      <div class="page-header">
        <div>
          <div class="page-title" x-text="$store.i18n.t('config_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('config_subtitle')"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:var(--color-text-dim)" x-show="$store.config.path"
                x-text="`${$store.i18n.t('config_path')}: ${$store.config.path}`"></span>
          <button class="btn btn-ghost btn-sm" @click="$store.config.load()"
                  :disabled="$store.config.loading"
                  x-text="$store.config.loading ? $store.i18n.t('loading') : $store.i18n.t('config_reload')"></button>
        </div>
      </div>

      <div x-show="$store.config.loading" class="empty-state">
        <div class="spinner" style="width:32px;height:32px;margin:0 auto 12px"></div>
        <p x-text="$store.i18n.t('loading')"></p>
      </div>

      <template x-if="!$store.config.loading && $store.config.raw">
        <div style="display:flex;flex-direction:column;gap:12px;flex:1;min-height:0">
          <!-- 工具栏 -->
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-weight:600;font-size:13px" x-text="$store.i18n.t('config_raw')"></span>
            <button class="btn btn-ghost btn-sm" @click="$store.config.copy()"
                    x-text="$store.config.copied ? $store.i18n.t('config_copied') : $store.i18n.t('config_copy')"></button>
          </div>

          <!-- 代码展示 -->
          <pre style="flex:1;overflow:auto;background:var(--color-surface);border:1px solid var(--color-border);border-radius:8px;padding:16px;font-family:monospace;font-size:12px;line-height:1.6;margin:0;tab-size:2"
               x-text="$store.config.raw"></pre>
        </div>
      </template>
    </div><!-- /config -->
