<div x-show="$store.nav.page === 'computer'" x-cloak x-data="{ store: $store.computer }" class="page-container flex flex-col" style="overflow:hidden;padding:0">
    <div style="flex:1;min-height:0;overflow-y:auto;padding:24px">
        <div class="max-w-5xl mx-auto w-full flex flex-col min-h-full space-y-6">
            <div class="page-header border-b-0 pb-0">
                <div>
                    <div class="page-title" x-text="$store.i18n.t('computer_control_title') || '电脑操控'"></div>
                    <div class="page-subtitle mt-1" x-text="$store.i18n.t('computer_control_desc') || '控制 Agent 如何使用您电脑上的应用程序和浏览器'"></div>
                </div>
            </div>

    <!-- 权限模式选择 -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-5">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">权限模式</h3>
        
        <div class="space-y-4">
            <!-- 默认权限 -->
            <label class="flex items-start p-4 border rounded-lg cursor-pointer transition-colors"
                :class="store.mode === 'default' ? 'border-primary-500 bg-primary-50 dark:bg-primary-900/20' : 'border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50'">
                <div class="flex-shrink-0 mt-0.5">
                    <input type="radio" name="computer_mode" value="default" class="w-4 h-4 text-primary-600 border-gray-300 focus:ring-primary-500"
                        :checked="store.mode === 'default'" @change="store.setMode('default')">
                </div>
                <div class="ml-3">
                    <div class="flex items-center">
                        <span class="text-base font-medium text-gray-900 dark:text-white">默认权限 (严格安全)</span>
                        <span class="ml-2 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">推荐高敏环境</span>
                    </div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">每次进行敏感操作（如点击输入框、打开新应用）都会弹窗请求您的确认。遵循严格的 HITL 安全网关策略。</p>
                </div>
            </label>

            <!-- 自动审查 -->
            <label class="flex items-start p-4 border rounded-lg cursor-pointer transition-colors"
                :class="store.mode === 'auto_review' ? 'border-primary-500 bg-primary-50 dark:bg-primary-900/20' : 'border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50'">
                <div class="flex-shrink-0 mt-0.5">
                    <input type="radio" name="computer_mode" value="auto_review" class="w-4 h-4 text-primary-600 border-gray-300 focus:ring-primary-500"
                        :checked="store.mode === 'auto_review'" @change="store.setMode('auto_review')">
                </div>
                <div class="ml-3">
                    <div class="flex items-center">
                        <span class="text-base font-medium text-gray-900 dark:text-white">自动审查 (智能放行)</span>
                        <span class="ml-2 px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200">日常推荐</span>
                    </div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">常规操作（如阅读、滑动）将自动执行。仅在系统识别到高危行为（如输入密码、删除文件）时才拦截并要求审批。</p>
                </div>
            </label>

            <!-- 完全访问 -->
            <label class="flex items-start p-4 border rounded-lg cursor-pointer transition-colors"
                :class="store.mode === 'full_access' ? 'border-primary-500 bg-primary-50 dark:bg-primary-900/20' : 'border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50'">
                <div class="flex-shrink-0 mt-0.5">
                    <input type="radio" name="computer_mode" value="full_access" class="w-4 h-4 text-primary-600 border-gray-300 focus:ring-primary-500"
                        :checked="store.mode === 'full_access'" @change="store.setMode('full_access')">
                </div>
                <div class="ml-3">
                    <div class="flex items-center">
                        <span class="text-base font-medium text-gray-900 dark:text-white">完全访问权限 (上帝模式)</span>
                        <span class="ml-2 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">高危</span>
                    </div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">允许 Agent 自主执行任何操作而无需确认。请仅在沙箱环境或完全信任的局域网中使用。</p>
                </div>
            </label>
        </div>
    </div>

    <!-- 允许的应用开关 -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
        <div class="p-5 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white">允许操控的应用</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">指定 Agent 可以操作哪些目标应用</p>
        </div>
        <div class="p-5 space-y-6">
            
            <!-- 任何应用 -->
            <div class="flex items-center justify-between">
                <div>
                    <h4 class="text-base font-medium text-gray-900 dark:text-white flex items-center">
                        <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        任何应用
                    </h4>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">启用后，Agent 将获得全局操作系统的鼠标、键盘和截屏控制权。</p>
                </div>
                <button type="button" 
                    @click="store.toggleAnyApp()"
                    :class="store.anyAppEnabled ? 'bg-primary-600' : 'bg-gray-200 dark:bg-gray-700'"
                    class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-600 focus:ring-offset-2">
                    <span :class="store.anyAppEnabled ? 'translate-x-5' : 'translate-x-0'" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
                </button>
            </div>

            <!-- Google Chrome -->
            <div class="flex items-center justify-between">
                <div>
                    <h4 class="text-base font-medium text-gray-900 dark:text-white flex items-center">
                        <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                        Google Chrome (无头浏览器控制)
                    </h4>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">启用后，Agent 可以通过 CDP 协议启动无头浏览器以执行精准的网页交互。</p>
                </div>
                <button type="button" 
                    @click="store.toggleChrome()"
                    :class="store.chromeEnabled ? 'bg-primary-600' : 'bg-gray-200 dark:bg-gray-700'"
                    class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-600 focus:ring-offset-2">
                    <span :class="store.chromeEnabled ? 'translate-x-5' : 'translate-x-0'" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
                </button>
            </div>

        </div>
    </div>
        </div>
    </div>
</div>
