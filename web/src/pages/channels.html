<!-- ─────── 聊天平台集成页 ───────────────────────────── -->
    <div x-show="$store.nav.page === 'channels'" x-cloak class="page-container">
      <div class="page-header">
        <div>
          <div class="page-title" x-text="$store.i18n.t('channels_title')"></div>
          <div class="page-subtitle" x-text="$store.i18n.t('channels_subtitle')"></div>
        </div>
        <button class="btn btn-primary btn-sm" @click="$store.channels.openCreate()"
                x-text="$store.i18n.t('channels_add')"></button>
      </div>

      <div x-show="$store.channels.loading" class="empty-state" x-text="$store.i18n.t('loading')"></div>

      <div x-show="!$store.channels.loading && $store.channels.list.length === 0" class="empty-state">
        <div class="text-3xl mb-3">🔗</div>
        <div x-text="$store.i18n.t('channels_empty_title')"></div>
        <div class="text-sm text-base-content/60 mt-1" x-text="$store.i18n.t('channels_empty_hint')"></div>
      </div>

      <div class="grid gap-3">
        <template x-for="c in $store.channels.list" :key="c.id">
          <div class="provider-card" :class="{ disabled: !c.enabled }">
            <div class="provider-card-header">
              <div class="flex items-center gap-2">
                <span class="text-xl" x-text="$store.channels.typeIcon(c.type)"></span>
                <span class="provider-type-badge" x-text="$store.channels.typeLabel(c.type)"></span>
              </div>
              <label class="toggle" :aria-label="c.name + ' 启用状态'">
                <input type="checkbox" :name="'channel-toggle-' + c.id" :checked="c.enabled" @change="$store.channels.toggle(c)">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="provider-name" x-text="c.name"></div>
            <!-- Webhook URL 显示 -->
            <div x-show="c.webhook_url" class="mt-2">
              <div class="text-[11px] text-base-content/60 mb-1">Webhook URL</div>
              <div class="flex items-center gap-2 bg-base-200 p-1.5 px-2.5 rounded-box font-mono text-[11px] overflow-hidden">
                <span x-text="c.webhook_url" class="flex-1 overflow-hidden text-ellipsis whitespace-nowrap"></span>
                <button class="btn btn-ghost btn-sm" class="px-2 py-0.5 text-[11px] shrink-0 min-h-0 h-auto"
                  @click="$store.channels.copyWebhook(c.webhook_url)"
                  x-text="$store.i18n.t('channels_copy_webhook')"></button>
              </div>
            </div>
            <div class="provider-card-actions">
              <button class="btn btn-ghost btn-sm" @click="$store.channels.openEdit(c)"
                      x-text="$store.i18n.t('channels_edit')"></button>
              <button class="btn btn-ghost btn-sm" class="text-error"
                @click="confirm($store.i18n.t('confirm_delete')) && $store.channels.remove(c.id)"
                x-text="$store.i18n.t('channels_delete')"></button>
            </div>
          </div>
        </template>
      </div>

      <!-- 集成编辑 Modal -->
      <dialog class="modal" :class="{ 'modal-open': $store.channels.showModal }">
        <div class="modal-box">
          <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" @click="$store.channels.showModal=false">✕</button>
          </form>
          <h3 class="font-bold text-lg mb-4 pb-3 border-b border-base-200" x-text="$store.channels.editMode === 'create' ? $store.i18n.t('channels_add') : $store.i18n.t('channels_edit')"></h3>
          <div class="py-2 flex flex-col gap-3">
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium">平台类型</span></div>
              <select id="channel-type" name="channel-type" class="select select-bordered w-full" x-model="$store.channels.form.type"
                @change="$store.channels.form.config={}">
                <option value="telegram">✈ Telegram</option>
                <option value="feishu">🪁 飞书（Feishu / Lark）</option>
                <option value="slack"># Slack</option>
                <option value="discord">🎮 Discord</option>
                <option value="webhook">⚡ 通用 Webhook</option>
              </select>
            </label>
            <label class="form-control w-full">
              <div class="label"><span class="label-text font-medium">集成名称</span></div>
              <input id="channel-name" name="channel-name" class="input input-bordered w-full" type="text" x-model="$store.channels.form.name" placeholder="如：客服机器人" />
            </label>

            <!-- Telegram -->
            <template x-if="$store.channels.form.type === 'telegram'">
              <div class="flex flex-col gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Bot Token</span></div>
                  <input id="tg-bot-token" name="tg-bot-token" class="input input-bordered w-full" type="password" placeholder="123456:ABC-DEF1234..."
                    :value="$store.channels.form.config.bot_token || ''"
                    @input="$store.channels.form.config.bot_token = $event.target.value" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">允许的用户 ID（逗号分隔，留空不限制）</span></div>
                  <input id="tg-allowed-users" name="tg-allowed-users" class="input input-bordered w-full" type="text" placeholder="123456789,987654321"
                    :value="$store.channels.form.config.allowed_user_ids || ''"
                    @input="$store.channels.form.config.allowed_user_ids = $event.target.value" />
                </label>
                <div class="label pb-0"><span class="label-text-alt text-base-content/60">填入 Bot Token 并启用后，服务器自动通过 <strong>Long Polling</strong> 接收消息，无需公网域名或 Webhook 配置。</span></div>
              </div>
            </template>

            <!-- Feishu -->
            <template x-if="$store.channels.form.type === 'feishu'">
              <div class="flex flex-col gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">App ID</span></div>
                  <input id="feishu-app-id" name="feishu-app-id" class="input input-bordered w-full" type="text" placeholder="cli_..."
                    :value="$store.channels.form.config.app_id || ''"
                    @input="$store.channels.form.config.app_id = $event.target.value" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">App Secret</span></div>
                  <input id="feishu-app-secret" name="feishu-app-secret" class="input input-bordered w-full" type="password" placeholder="App Secret"
                    :value="$store.channels.form.config.app_secret || ''"
                    @input="$store.channels.form.config.app_secret = $event.target.value" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Verification Token</span></div>
                  <input id="feishu-verification-token" name="feishu-verification-token" class="input input-bordered w-full" type="text" placeholder="Verification Token"
                    :value="$store.channels.form.config.verification_token || ''"
                    @input="$store.channels.form.config.verification_token = $event.target.value" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Encrypt Key（可选）</span></div>
                  <input id="feishu-encrypt-key" name="feishu-encrypt-key" class="input input-bordered w-full" type="password" placeholder="留空则不加密"
                    :value="$store.channels.form.config.encrypt_key || ''"
                    @input="$store.channels.form.config.encrypt_key = $event.target.value" />
                </label>
                <div class="label pb-0"><span class="label-text-alt text-base-content/60">在飞书开发者后台 → 事件订阅 → 请求地址，填入上方 Webhook URL。</span></div>
              </div>
            </template>

            <!-- Slack -->
            <template x-if="$store.channels.form.type === 'slack'">
              <div class="flex flex-col gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Bot Token</span></div>
                  <input id="slack-bot-token" name="slack-bot-token" class="input input-bordered w-full" type="password" placeholder="xoxb-..."
                    :value="$store.channels.form.config.bot_token || ''"
                    @input="$store.channels.form.config.bot_token = $event.target.value" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Signing Secret</span></div>
                  <input id="slack-signing-secret" name="slack-signing-secret" class="input input-bordered w-full" type="password" placeholder="Signing Secret"
                    :value="$store.channels.form.config.signing_secret || ''"
                    @input="$store.channels.form.config.signing_secret = $event.target.value" />
                </label>
                <div class="label pb-0"><span class="label-text-alt text-base-content/60">在 Slack App → Event Subscriptions → Request URL，填入 Webhook URL。</span></div>
              </div>
            </template>

            <!-- Discord -->
            <template x-if="$store.channels.form.type === 'discord'">
              <div class="flex flex-col gap-3">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Bot Token</span></div>
                  <input id="discord-bot-token" name="discord-bot-token" class="input input-bordered w-full" type="password" placeholder="Discord Bot Token"
                    :value="$store.channels.form.config.bot_token || ''"
                    @input="$store.channels.form.config.bot_token = $event.target.value" />
                </label>
                <label class="form-control w-full">
                  <div class="label"><span class="label-text font-medium">Public Key</span></div>
                  <input id="discord-public-key" name="discord-public-key" class="input input-bordered w-full" type="text" placeholder="Application Public Key"
                    :value="$store.channels.form.config.public_key || ''"
                    @input="$store.channels.form.config.public_key = $event.target.value" />
                </label>
                <div class="label pb-0"><span class="label-text-alt text-base-content/60">在 Discord Developer Portal → Interactions Endpoint URL，填入 Webhook URL。</span></div>
              </div>
            </template>

            <!-- Generic Webhook -->
            <template x-if="$store.channels.form.type === 'webhook'">
              <div class="label pb-0">
                <span class="label-text-alt text-base-content/60">通用 Webhook：POST body 中 <code>{"content":"消息文本"}</code> 将转发给 Agent。</span>
              </div>
            </template>

            <div class="form-control mt-4 w-max">
              <label class="cursor-pointer label gap-2">
                <input type="checkbox" name="channel-enabled" class="toggle toggle-primary" x-model="$store.channels.form.enabled">
                <span class="label-text">启用</span>
              </label>
            </div>
          </div>
          <div class="modal-action">
            <button class="btn btn-ghost" @click="$store.channels.showModal=false"
                    x-text="$store.i18n.t('cancel')"></button>
            <button class="btn btn-primary" @click="$store.channels.save()"
                    x-text="$store.i18n.t('save')"></button>
          </div>
        </div>
        <form method="dialog" class="modal-backdrop">
          <button @click="$store.channels.showModal=false">close</button>
        </form>
      </dialog>
    </div><!-- /channels -->
