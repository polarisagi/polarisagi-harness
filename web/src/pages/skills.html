<!-- 技能页（已安装技能列表）-->
    <div x-show="$store.nav.page === 'skills'" x-cloak class="flex-1 min-h-0 overflow-y-auto p-6 flex flex-col overflow-hidden p-0">

      <div class="flex-1 min-h-0 overflow-y-auto p-6">
        <div class="max-w-4xl mx-auto w-full flex flex-col flex-1">

        <div class="flex items-center justify-between mb-6">
          <div>
            <div class="text-2xl font-bold" x-text="$store.i18n.t('skills_title')"></div>
            <div class="text-sm text-base-content/60 mt-1">
              <span x-text="$store.i18n.t('skills_installed_prefix') + $store.skills.list.length + $store.i18n.t('skills_installed_suffix')"></span>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" @click="$store.skills.load()"
                    x-text="$store.skills.loading ? $store.i18n.t('loading') : $store.i18n.t('skills_refresh')"></button>
            <button class="btn btn-primary btn-sm" @click="$store.nav.navigate('plugins')"
                    x-text="$store.i18n.t('skills_browse_plugins')"></button>
          </div>
        </div>

        <div x-show="$store.skills.loading" class="flex flex-col items-center justify-center py-16 text-base-content/50 text-center gap-4">
          <div class="loading loading-spinner loading-lg mx-auto mb-3 block"></div>
          <p x-text="$store.i18n.t('loading')"></p>
        </div>

        <div class="flex flex-col items-center justify-center py-16 text-base-content/50 text-center gap-4" x-show="!$store.skills.loading && $store.skills.list.length === 0">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z"/>
          </svg>
          <h3 x-text="$store.i18n.t('skills_empty_title')"></h3>
          <p x-text="$store.i18n.t('skills_empty_hint')"></p>
          <button class="btn btn-primary btn-sm" class="mt-3"
                  @click="$store.nav.navigate('plugins')"
                  x-text="$store.i18n.t('skills_browse_plugins')"></button>
        </div>

        <div class="grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-3">
          <template x-for="sk in $store.skills.list" :key="sk.id || sk.name">
            <div class="skill-card">
              <div class="skill-icon" x-text="sk.icon || '⚡'"></div>
              <div class="skill-name" x-text="sk.name"></div>
              <div class="skill-desc" x-text="sk.description || $store.i18n.t('skills_no_desc')"></div>
              <div class="mt-2 flex flex-wrap gap-1">
                <span class="skill-tag" x-text="sk.version || 'v1.0'"></span>
                <span class="skill-tag"
                      x-show="sk.enabled"
                      class="bg-success/20 text-success"
                      x-text="$store.i18n.t('cap_enable')"></span>
              </div>
            </div>
          </template>
        </div>

        </div>
      </div>

    </div><!-- /skills -->
