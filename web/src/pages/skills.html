<!-- 技能页（已安装技能列表）-->
    <div x-show="$store.nav.page === 'skills'" x-cloak class="page-container flex flex-col"
         style="overflow:hidden;padding:0">

      <div style="flex:1;min-height:0;overflow-y:auto;padding:24px">
        <div class="max-w-5xl mx-auto w-full flex flex-col min-h-full">

        <div class="page-header">
          <div>
            <div class="page-title" x-text="$store.i18n.t('skills_title')"></div>
            <div class="page-subtitle">
              <span x-text="$store.i18n.t('skills_installed_prefix') + $store.skills.list.length + $store.i18n.t('skills_installed_suffix')"></span>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" @click="$store.skills.load()"
                    x-text="$store.skills.loading ? $store.i18n.t('loading') : $store.i18n.t('skills_refresh')"></button>
            <button class="btn btn-primary btn-sm" @click="$store.nav.navigate('plugins')"
                    x-text="$store.i18n.t('skills_browse_plugins')"></button>
          </div>
        </div>

        <div x-show="$store.skills.loading" class="empty-state">
          <div class="spinner" style="width:32px;height:32px;margin:0 auto 12px"></div>
          <p x-text="$store.i18n.t('loading')"></p>
        </div>

        <div class="empty-state" x-show="!$store.skills.loading && $store.skills.list.length === 0">
          <svg fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z"/>
          </svg>
          <h3 x-text="$store.i18n.t('skills_empty_title')"></h3>
          <p x-text="$store.i18n.t('skills_empty_hint')"></p>
          <button class="btn btn-primary btn-sm" style="margin-top:12px"
                  @click="$store.nav.navigate('plugins')"
                  x-text="$store.i18n.t('skills_browse_plugins')"></button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
          <template x-for="sk in $store.skills.list" :key="sk.id || sk.name">
            <div class="skill-card">
              <div class="skill-icon" x-text="sk.icon || '⚡'"></div>
              <div class="skill-name" x-text="sk.name"></div>
              <div class="skill-desc" x-text="sk.description || $store.i18n.t('skills_no_desc')"></div>
              <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px">
                <span class="skill-tag" x-text="sk.version || 'v1.0'"></span>
                <span class="skill-tag"
                      x-show="sk.enabled"
                      style="background:color-mix(in srgb,var(--color-ok) 20%,transparent);color:var(--color-ok)"
                      x-text="$store.i18n.t('cap_enable')"></span>
              </div>
            </div>
          </template>
        </div>

        </div>
      </div>

    </div><!-- /skills -->
