<!-- 技能库页 (M13 §8.1 独立页) -->
<div x-show="$store.nav.page === 'skills'" x-cloak class="flex-1 overflow-y-auto min-h-0 p-6 bg-base-100">
  <div class="max-w-4xl mx-auto w-full flex flex-col">

    <!-- Page Header -->
    <div class="mb-8 border-b border-base-300 pb-4 flex justify-between items-end">
      <div>
        <h2 class="text-2xl font-bold text-base-content" x-text="$store.i18n.t('skills_title')"></h2>
        <p class="text-sm text-base-content/60 mt-1">
          <span x-text="$store.i18n.t('skills_installed_prefix')"></span>
          <span x-text="$store.skills.list.length"></span>
          <span x-text="$store.i18n.t('skills_installed_suffix')"></span>
        </p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost btn-sm border border-base-300 shadow-sm"
                @click="$store.nav.navigate('plugins')"
                x-text="$store.i18n.t('skills_browse_plugins')"></button>
        <button class="btn btn-ghost btn-sm border border-base-300 shadow-sm"
                @click="$store.skills.load()"
                :disabled="$store.skills.loading">
          <span x-show="$store.skills.loading" class="loading loading-spinner loading-xs"></span>
          <span x-show="!$store.skills.loading" x-text="$store.i18n.t('skills_refresh')"></span>
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div x-show="$store.skills.loading"
         class="flex flex-col items-center justify-center py-20 text-base-content/60">
      <span class="loading loading-spinner loading-lg mb-4 text-primary"></span>
      <p x-text="$store.i18n.t('loading')"></p>
    </div>

    <!-- Empty State -->
    <div x-show="!$store.skills.loading && $store.skills.list.length === 0"
         class="flex flex-col items-center justify-center py-20 text-base-content/60 bg-base-200/50 rounded-box border border-dashed border-base-300">
      <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 6.087c0-.355.186-.676.401-.959.221-.29.349-.634.349-1.003 0-1.036-1.007-1.875-2.25-1.875s-2.25.84-2.25 1.875c0 .369.128.713.349 1.003.215.283.401.604.401.959v0a.64.64 0 0 1-.657.643 48.39 48.39 0 0 1-4.163-.3c.186 1.613.293 3.25.315 4.907a.656.656 0 0 1-.658.663v0c-.355 0-.676-.186-.959-.401a1.647 1.647 0 0 0-1.003-.349c-1.036 0-1.875 1.007-1.875 2.25s.84 2.25 1.875 2.25c.369 0 .713-.128 1.003-.349.283-.215.604-.401.959-.401v0c.31 0 .555.26.532.57a48.039 48.039 0 0 1-.642 5.056c1.518.19 3.058.309 4.616.354a.64.64 0 0 0 .657-.643v0c0-.355-.186-.676-.401-.959a1.647 1.647 0 0 1-.349-1.003c0-1.035 1.008-1.875 2.25-1.875 1.243 0 2.25.84 2.25 1.875 0 .369-.128.713-.349 1.003-.215.283-.4.604-.4.959v0c0 .333.277.599.61.58a48.1 48.1 0 0 0 5.427-.63 48.05 48.05 0 0 0 .582-4.717.532.532 0 0 0-.533-.57v0c-.355 0-.676.186-.959.401-.29.221-.634.349-1.003.349-1.035 0-1.875-1.007-1.875-2.25s.84-2.25 1.875-2.25c.37 0 .713.128 1.003.349.283.215.604.401.959.401v0a.656.656 0 0 0 .658-.663 48.422 48.422 0 0 0-.37-5.36c-1.886.342-3.81.574-5.766.689a.578.578 0 0 1-.61-.58v0Z"/>
      </svg>
      <h3 class="text-lg font-bold text-base-content/80 mb-1"
          x-text="$store.i18n.t('skills_empty_title')"></h3>
      <p class="text-sm mb-4" x-text="$store.i18n.t('skills_empty_hint')"></p>
      <button class="btn btn-primary btn-sm"
              @click="$store.nav.navigate('plugins')"
              x-text="$store.i18n.t('skills_browse_plugins')"></button>
    </div>

    <!-- Skills Grid -->
    <div x-show="!$store.skills.loading && $store.skills.list.length > 0"
         class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <template x-for="sk in $store.skills.list" :key="sk.name">
        <div class="card bg-base-200 border border-base-300 shadow-sm hover:shadow-md transition-shadow h-full flex flex-col"
             :class="sk.enabled ? 'border-l-4 border-l-primary' : 'border-l-4 border-l-base-300 opacity-70'">
          <div class="card-body p-5 flex flex-col gap-3">

            <!-- Header -->
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <h3 class="font-bold text-base truncate" x-text="sk.name"></h3>
                <div class="flex flex-wrap gap-1.5 mt-1.5">
                  <!-- 版本 -->
                  <span x-show="sk.version"
                        class="badge badge-ghost badge-sm font-mono text-[10px]"
                        x-text="`v${sk.version}`"></span>
                  <!-- 来源 -->
                  <span class="badge badge-sm font-bold uppercase text-[10px]"
                        :class="{
                          'badge-primary badge-outline': sk.source === 'wasm' || sk.source === 'wasm_builtin',
                          'badge-secondary badge-outline': sk.source === 'script',
                          'badge-ghost': !sk.source
                        }"
                        x-text="sk.source || 'unknown'"></span>
                </div>
              </div>
              <!-- 启用/禁用徽章 -->
              <div class="shrink-0">
                <span x-show="sk.enabled"
                      class="badge badge-success badge-sm badge-outline font-bold">ON</span>
                <span x-show="!sk.enabled"
                      class="badge badge-ghost badge-sm font-bold">OFF</span>
              </div>
            </div>

            <!-- Description -->
            <p class="text-xs text-base-content/70 flex-1 line-clamp-3"
               x-text="sk.description || $store.i18n.t('skills_no_desc')"></p>

          </div>
        </div>
      </template>
    </div>

  </div>
</div>
