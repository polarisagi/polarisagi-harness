name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  docs-toc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: docs/arch §跳读 行号一致性
        run: make docs-check
      - name: docs/arch 禁 Go 代码块 / 完整签名 (#9)
        run: make docs-lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: spec consistency (state.yaml SSoT)
        run: go test -run "^TestSpec" ./internal/protocol/... -v
      - run: go test ./pkg/... ./internal/... -v -race -coverprofile=coverage.out
      - run: go tool cover -func=coverage.out

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path rust/substrate/Cargo.toml
      - run: cargo fmt --manifest-path rust/substrate/Cargo.toml --check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: dtolnay/rust-toolchain@stable
      - run: make build

  eval-gate:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go run ./cmd/polaris eval --ci-gate
