linters:
  enable:
    # 既有基础 linter（不动）
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - nilerr
    - prealloc
    - unconvert
    # ADR-0013 Phase 1 新增（执行带 1）
    - depguard      # B1 + R1.7 层依赖方向
    - errorlint     # R1.2 错误包装（缺 %w / errors.Is/As 错用）
    - nestif        # R7 嵌套深度
    - gocyclo       # R7 圈复杂度

linters-settings:
  goimports:
    local-prefixes: github.com/polarisagi/polarisagi-harness

  # ADR-0013: depguard 守护 04-Module-Boundary.md B1 单向依赖
  # 矩阵: L0 ← L1 ← L2 ← L3；internal/ 与同层（L3 内部）允许互引
  depguard:
    rules:
      L0_substrate:
        files:
          - "**/pkg/substrate/**"
        deny:
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/cognition
            desc: "L0 不可引 L1 cognition (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/action
            desc: "L0 不可引 L1 action (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/swarm
            desc: "L0 不可引 L2 swarm (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/governance
            desc: "L0 不可引 L3 governance (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/edge
            desc: "L0 不可引 L3 edge (B1 + R1.7)"
      L1_cognition_action:
        files:
          - "**/pkg/cognition/**"
          - "**/pkg/action/**"
        deny:
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/swarm
            desc: "L1 不可引 L2 (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/governance
            desc: "L1 不可引 L3 (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/edge
            desc: "L1 不可引 L3 (B1 + R1.7)"
      L2_swarm:
        files:
          - "**/pkg/swarm/**"
        deny:
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/governance
            desc: "L2 不可引 L3 (B1 + R1.7)"
          - pkg: github.com/polarisagi/polarisagi-harness/pkg/edge
            desc: "L2 不可引 L3 (B1 + R1.7)"

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  nestif:
    # R7 嵌套深度 ≤ 3；nestif 用复杂度评分（不是直接深度数）
    # 起始 5 = 中度宽松，避免初次启用铺红；后续可逐步降至 4
    min-complexity: 5

  gocyclo:
    # R7 圈复杂度 ≤ 15；与宪法严格对齐
    min-complexity: 15

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - errorlint
        - nestif
        - gocyclo
