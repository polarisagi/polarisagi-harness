# polaris-harness default configuration
# Tier: 0 (8GB RAM) - all remote API, no local model

system:
  tier: 0
  max_agents: 3
  go_memlimit_mb: 150

inference:
  default_provider: deepseek-v4-flash
  reasoning_provider: deepseek-v4-pro
  structured_output: grammar
  cache:
    enabled: true
    backend: pebble

storage:
  engines:
    relational: sqlite
    vector: sqlite-vec
    graph: loradb
    kv: pebble
    fulltext: sqlite-fts5
    eventlog: wal

observability:
  traces:
    enabled: true
    sampler: 1.0
  metrics:
    enabled: true
  logs:
    level: info
    format: json

agent:
  kernel:
    state_machine: dual_route
    default_surprise_threshold: 0.5
  memory:
    layers: [working, episodic, semantic, procedural]
    consolidation: manual
  skill:
    builtin_path: skills/
    max_logic_collapse_concurrent: 1

orchestrator:
  mode: blackboard
  protocol: structured_event

self_improve:
  gradient: false
  auto_curriculum: false
  logic_collapse:
    enabled: true
    min_success_for_trigger: 50

knowledge:
  rag:
    mode: hybrid
    graphrag: microsoft

policy:
  engine: cedar
  default_block: true

eval:
  ci_gate: true
  shadow_deploy: false

interface:
  cli: true
  http: true
  grpc: false
  websocket: false
